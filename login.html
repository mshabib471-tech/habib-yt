<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Habib YT | Login</title>
  <style>
    body {
      background: linear-gradient(135deg, #007bff, #00c6ff);
      font-family: "Poppins", sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      color: white;
    }
    .login-box {
      background: white;
      color: #333;
      padding: 25px 30px;
      border-radius: 12px;
      width: 90%;
      max-width: 380px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.2);
      text-align: center;
    }
    .login-box h2 { margin-bottom: 20px; color: #007bff; }
    input {
      width: 100%; padding: 12px; margin: 8px 0;
      border: 1px solid #ccc; border-radius: 8px;
    }
    button {
      width: 100%; padding: 12px; margin: 10px 0;
      background: #007bff; color: white; border: none;
      border-radius: 8px; font-weight: bold; cursor: pointer;
    }
    button:hover { background: #0056d4; }
    .google-btn {
      background: #db4437;
    }
    a { color: #007bff; text-decoration: none; font-weight: bold; }
  </style>
</head>
<body>

  <div class="login-box">
    <h2>🔐 লগইন করুন</h2>
    <input id="loginEmail" type="email" placeholder="ইমেইল দিন">
    <input id="loginPassword" type="password" placeholder="পাসওয়ার্ড দিন">
    <button onclick="loginUser()">লগইন</button>
    <button class="google-btn" onclick="googleLogin()">Google দিয়ে লগইন</button>

    <p>একাউন্ট নেই? <a href="#" onclick="document.getElementById('signup').style.display='block'">রেজিস্টার করুন</a></p>
  </div>

  <!-- রেজিস্টার -->
  <div id="signup" class="login-box" style="display:none; position:absolute; top:10%;">
    <h2>📝 রেজিস্টার করুন</h2>
    <input id="signupEmail" type="email" placeholder="ইমেইল দিন">
    <input id="signupPassword" type="password" placeholder="পাসওয়ার্ড দিন">
    <button onclick="registerUser()">রেজিস্টার</button>
    <button onclick="document.getElementById('signup').style.display='none'">লগইনে ফিরে যান</button>
  </div>

  <script type="module" src="firebase.js"></script>
  <script type="module" src="app.js"></script>
</body>
</html>
