<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login — Habib YT</title>

<style>
  body { font-family: Poppins; background:#f5f7fb; text-align:center; margin:0; padding-top:70px; }
  .box { width:90%; max-width:380px; margin:auto; background:white; padding:25px; border-radius:12px; box-shadow:0 2px 8px rgba(0,0,0,0.1); }
  input { width:100%; padding:10px; border-radius:6px; border:1px solid #ccc; margin-top:6px; }
  button { width:100%; padding:10px; margin-top:14px; background:#007bff; color:white; border:none; border-radius:6px; font-weight:bold; }
  .google { background:#db4437 !important; }
</style>
</head>

<body>

<h2 style="color:#007bff;">🔐 Login to Your Account</h2>

<div class="box">
  <input type="email" id="loginEmail" placeholder="Enter Email">
  <input type="password" id="loginPassword" placeholder="Enter Password">

  <button onclick="loginUser()">Login</button>
  <button class="google" onclick="googleLogin()">Login With Google</button>

  <p>Don't have an account? <a href="register.html">Register</a></p>
</div>

<script type="module" src="firebase.js"></script>
<script type="module" src="app.js"></script>

</body>
</html>
