<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>লগইন করুন | Habib YT</title>
  <style>
    body {
      font-family: "Poppins", sans-serif;
      background: #f4f7fb;
      color: #222;
      text-align: center;
      padding: 0;
      margin: 0;
    }
    header {
      background: #007bff;
      color: white;
      padding: 15px;
      font-size: 22px;
      font-weight: 600;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }
    form {
      background: white;
      width: 90%;
      max-width: 400px;
      margin: 30px auto;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    }
    input {
      width: 100%;
      padding: 10px;
      margin: 8px 0;
      border: 1px solid #ccc;
      border-radius: 8px;
      font-size: 16px;
    }
    button {
      background: #007bff;
      color: white;
      border: none;
      padding: 12px;
      border-radius: 8px;
      font-size: 16px;
      cursor: pointer;
      width: 100%;
      font-weight: 600;
      transition: 0.2s;
    }
    button:hover { background: #0056d4; }
    .google-btn {
      background: #db4437;
      margin-top: 10px;
    }
    p a {
      color: #007bff;
      text-decoration: none;
      font-weight: 500;
    }
    footer {
      text-align: center;
      color: #555;
      margin-top: 20px;
      font-size: 14px;
    }
    .home-btn {
      background: #28a745;
      margin-top: 10px;
    }
  </style>
</head>
<body>
  <header>🔐 লগইন করুন</header>

  <form onsubmit="event.preventDefault(); loginUser();">
    <h3>Habib YT — আপনার বিশ্বস্ত সহযোগী</h3>
    <input type="email" id="loginEmail" placeholder="Email" required />
    <input type="password" id="loginPassword" placeholder="Password" required />
    <button type="submit">Login</button>
    <button type="button" class="google-btn" onclick="googleLogin()">Login with Google</button>

    <p>নতুন একাউন্ট নেই? <a href="signup.html">Sign Up</a></p>
    <button type="button" class="home-btn" onclick="window.location.href='index.html'">🏠 Go to Home</button>
  </form>

  <footer>© 2025 Habib YT</footer>

  <script type="module" src="firebase.js"></script>
  <script type="module">
    import { auth, provider } from "./firebase.js";
    import { signInWithEmailAndPassword, signInWithPopup, onAuthStateChanged } 
    from "https://www.gstatic.com/firebasejs/12.5.0/firebase-auth.js";

    // ✅ Auto Redirect if already logged in
    onAuthStateChanged(auth, (user) => {
      if (user) window.location.href = "dashboard.html";
    });

    // ✅ Login with Email
    window.loginUser = async function () {
      const email = document.getElementById("loginEmail").value;
      const pass = document.getElementById("loginPassword").value;
      try {
        await signInWithEmailAndPassword(auth, email, pass);
        window.location.href = "dashboard.html";
      } catch (err) {
        alert("❌ লগইন ব্যর্থ: " + err.message);
      }
    };

    // ✅ Google Login
    window.googleLogin = async function () {
      try {
        await signInWithPopup(auth, provider);
        window.location.href = "dashboard.html";
      } catch (err) {
        alert("❌ Google Login ব্যর্থ: " + err.message);
      }
    };
  </script>
</body>
</html>
