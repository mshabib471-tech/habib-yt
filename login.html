<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Login | Habib YT</title>
<style>
body{font-family:'Poppins',sans-serif;background:#eef3ff;display:flex;justify-content:center;align-items:center;height:100vh;}
.box{background:white;border-radius:12px;padding:30px;width:320px;box-shadow:0 3px 8px rgba(0,0,0,0.1);}
input{width:100%;padding:10px;margin:6px 0;border:1px solid #ccc;border-radius:6px;}
button{width:100%;padding:10px;margin-top:8px;border:none;border-radius:6px;background:#007bff;color:white;font-size:15px;}
</style>
</head>
<body>
<div class="box">
<h2>Login To Habib YT</h2>
<input type="email" id="email" placeholder="Email">
<input type="password" id="password" placeholder="Password">
<button id="loginBtn">Sign In</button>
<hr>
<button id="googleBtn" style="background:#ea4335;">Sign in with Google</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.5.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, GoogleAuthProvider, signInWithPopup } from "https://www.gstatic.com/firebasejs/12.5.0/firebase-auth.js";
const firebaseConfig={apiKey:"AIzaSyAaLdtzOIZVYB-Bdc42CXm2T8iclWLc4o0",authDomain:"habib-yt.firebaseapp.com",projectId:"habib-yt"};
const app=initializeApp(firebaseConfig);const auth=getAuth(app);
document.getElementById("loginBtn").onclick=()=>{signInWithEmailAndPassword(auth,email.value,password.value).then(()=>location.href="dashboard.html").catch(e=>alert(e.message))};
document.getElementById("googleBtn").onclick=()=>{signInWithPopup(auth,new GoogleAuthProvider()).then(()=>location.href="dashboard.html").catch(e=>alert(e.message))};
</script>
</body>
</html>
