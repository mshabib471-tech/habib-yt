<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login | Habib YT</title>
  <link rel="stylesheet" href="assets/style.css" />
  <script type="module" src="firebase.js"></script>
</head>
<body>
  <header><h1><span>Habib</span> YT</h1></header>
  <section>
    <h2>Login</h2>
    <input id="email" type="email" placeholder="Email" /><br /><br />
    <input id="password" type="password" placeholder="Password" /><br /><br />
    <button id="loginBtn" class="login-btn">Login</button>
    <button id="googleBtn" class="login-btn" style="background:#ea4335">Login with Google</button>
  </section>

  <script type="module">
    import { auth, provider } from "./firebase.js";
    import { signInWithEmailAndPassword, signInWithPopup } from "https://www.gstatic.com/firebasejs/12.5.0/firebase-auth.js";

    const email = document.getElementById("email");
    const password = document.getElementById("password");
    document.getElementById("loginBtn").addEventListener("click", async () => {
      try {
        await signInWithEmailAndPassword(auth, email.value, password.value);
        alert("Login Successful!");
        window.location.href = "dashboard.html";
      } catch (e) {
        alert(e.message);
      }
    });

    document.getElementById("googleBtn").addEventListener("click", async () => {
      try {
        await signInWithPopup(auth, provider);
        alert("Google Login Successful!");
        window.location.href = "dashboard.html";
      } catch (e) {
        alert(e.message);
      }
    });
  </script>
</body>
</html>
