<!-- login.html -->
<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Login | Habib YT</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body style="background:#eef4ff;">
  <div style="max-width:420px;margin:40px auto;padding:20px;">
    <div class="card-small center">
      <h2>Login to Habib YT</h2>
      <p class="small">Email বা Google দিয়ে লগইন করুন</p>

      <input id="email" type="email" placeholder="Email" />
      <input id="password" type="password" placeholder="Password" />
      <button id="loginBtn" class="btn">Sign in</button>

      <div style="margin-top:10px;text-align:center;">
        <button id="googleBtn" class="btn btn-ghost">Sign in with Google</button>
      </div>

      <p id="msg" class="small" style="margin-top:10px;color:#c00;"></p>
    </div>
  </div>

  <script type="module">
    import { auth, provider, ensureUserDoc, go } from './app.js';
    import { signInWithEmailAndPassword, signInWithPopup } from "https://www.gstatic.com/firebasejs/12.5.0/firebase-auth.js";
    import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.5.0/firebase-auth.js";

    const email = document.getElementById('email');
    const password = document.getElementById('password');
    const msg = document.getElementById('msg');

    document.getElementById('loginBtn').addEventListener('click', async () => {
      try {
        await signInWithEmailAndPassword(auth, email.value, password.value);
        onAuthStateChanged(auth, async (u) => {
          if (u) { await ensureUserDoc(u); window.location.href = 'dashboard.html'; }
        });
      } catch (e) {
        msg.textContent = e.message;
      }
    });

    document.getElementById('googleBtn').addEventListener('click', async () => {
      try {
        await signInWithPopup(auth, provider);
        onAuthStateChanged(auth, async (u) => {
          if (u) { await ensureUserDoc(u); window.location.href = 'dashboard.html'; }
        });
      } catch (e) {
        msg.textContent = e.message;
      }
    });
  </script>
</body>
</html>
