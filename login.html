<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login | Habib YT</title>
  <link rel="stylesheet" href="assets/style.css" />
  <script type="module" src="firebase.js"></script>
</head>
<body>
  <header>
    <h1><span>Habib</span> YT</h1>
    <div class="nav-buttons">
      <a href="index.html"><button class="login-btn">Home</button></a>
      <button id="toggle" class="toggle-btn">🌙 Dark Mode</button>
    </div>
  </header>

  <section>
    <h2>Login to your account</h2>
    <input id="email" type="email" placeholder="Email" /><br /><br />
    <input id="password" type="password" placeholder="Password" /><br /><br />
    <button id="loginBtn" class="login-btn">Login</button>
    <button id="googleBtn" class="login-btn" style="background:#ea4335;">Login with Google</button>
    <p id="msg"></p>
  </section>

  <script type="module">
    import { auth, provider } from "./firebase.js";
    import { signInWithEmailAndPassword, signInWithPopup } from "https://www.gstatic.com/firebasejs/12.5.0/firebase-auth.js";

    const email = document.getElementById("email");
    const password = document.getElementById("password");
    const msg = document.getElementById("msg");

    document.getElementById("loginBtn").addEventListener("click", async () => {
      try {
        await signInWithEmailAndPassword(auth, email.value, password.value);
        msg.innerHTML = "✅ Login Successful!";
        window.location.href = "dashboard.html";
      } catch (e) {
        msg.innerHTML = "❌ " + e.message;
      }
    });

    document.getElementById("googleBtn").addEventListener("click", async () => {
      try {
        await signInWithPopup(auth, provider);
        msg.innerHTML = "✅ Google Login Successful!";
        window.location.href = "dashboard.html";
      } catch (e) {
        msg.innerHTML = "❌ " + e.message;
      }
    });
  </script>
</body>
</html>
