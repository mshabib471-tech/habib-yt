<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard | Habib YT</title>

<style>
  body{
    margin:0;
    font-family:Poppins, sans-serif;
    background:#eef2ff;
    padding-bottom:80px;
  }

  /* HEADER */
  header{
    background:#0a7cff;
    color:white;
    padding:15px;
    text-align:center;
    font-size:22px;
    font-weight:600;
    box-shadow:0 3px 10px rgba(0,0,0,0.15);
  }

  /* BALANCE BOX */
  .wallet-box{
    margin:15px;
    padding:18px;
    background:white;
    border-radius:14px;
    box-shadow:0 2px 8px rgba(0,0,0,0.15);
    text-align:center;
  }
  .wallet-box h2{ margin:0; font-size:30px; color:#0a7cff; }
  .wallet-box p{ margin:5px 0 0; font-size:14px; color:#555; }

  /* BUTTONS */
  .top-buttons{
    margin:15px;
    display:flex;
    gap:12px;
  }
  .btn{
    flex:1;
    background:#0a7cff;
    padding:12px;
    border-radius:12px;
    text-align:center;
    color:white;
    font-weight:600;
    cursor:pointer;
  }
  .btn:hover{ background:#0068d1; }

  /* ORDER LIST */
  .section-title{
    margin:15px;
    font-weight:600;
    font-size:18px;
    color:#222;
  }

  .order{
    background:white;
    margin:12px 15px;
    padding:15px;
    border-radius:12px;
    box-shadow:0 2px 6px rgba(0,0,0,0.1);
  }

  .order-top{
    display:flex;
    justify-content:space-between;
    font-weight:600;
  }

  .pending{ color:#ff9800; font-weight:700; }
  .approved{ color:#28a745; font-weight:700; }
  .rejected{ color:#e91e63; font-weight:700; }

  .order p{
    margin:5px 0;
    font-size:14px;
    color:#444;
  }

  /* FOOTER NAV */
  .bottom-nav{
    position:fixed;
    bottom:0;
    width:100%;
    background:white;
    display:flex;
    justify-content:space-around;
    padding:10px 0;
    border-top:1px solid #ccc;
  }
  .bottom-nav button{
    background:none;
    border:none;
    font-weight:600;
    color:#0a7cff;
    font-size:15px;
    cursor:pointer;
  }
</style>
</head>

<body>

<header>Dashboard</header>

<!-- BALANCE CARD -->
<div class="wallet-box">
  <p>Your Wallet Balance</p>
  <h2 id="balance">0</h2>
</div>

<!-- TOP BUTTONS -->
<div class="top-buttons">
  <div class="btn" onclick="location.href='add-money.html'">Add Money</div>
  <div class="btn" onclick="location.href='freefire.html'">Buy Diamond</div>
</div>

<!-- RECENT ORDERS -->
<h3 class="section-title">📦 Recent Orders</h3>
<div id="orderList"></div>

<!-- BOTTOM NAV -->
<div class="bottom-nav">
  <button onclick="location.href='index.html'">🏠 Home</button>
  <button onclick="location.href='dashboard.html'">📊 Dashboard</button>
  <button onclick="location.href='add-money.html'">💰 Add Money</button>
  <button onclick="location.href='login.html'">🔐 Login</button>
</div>

<!-- FIREBASE SCRIPT -->
<script type="module">

import { auth, db } from "./firebase.js";
import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.5.0/firebase-auth.js";
import { collection, query, where, orderBy, getDocs, getDoc, doc } from "https://www.gstatic.com/firebasejs/12.5.0/firebase-firestore.js";

/* LOGIN CHECK + LOAD DATA */
onAuthStateChanged(auth, async (user) => {
  if (!user) {
    alert("Login required!");
    location.href = "login.html";
    return;
  }

  /* LOAD BALANCE */
  const walletSnap = await getDoc(doc(db, "wallets", user.uid));
  let balance = walletSnap.exists() ? walletSnap.data().balance : 0;
  document.getElementById("balance").innerText = balance + " TK";

  /* LOAD ORDERS */
  const q = query(
    collection(db, "orders"),
    where("user", "==", user.uid),
    orderBy("created", "desc")
  );

  const snap = await getDocs(q);

  let html = "";
  let count = 1;

  snap.forEach(d => {
    const data = d.data();

    html += `
      <div class="order">
        <div class="order-top">
          <span>Order #${count}</span>
          <span class="${data.status}">${data.status.toUpperCase()}</span>
        </div>

        <p><b>Product:</b> ${data.product || data.package}</p>
        <p><b>UID:</b> ${data.uid}</p>
        <p><b>Price:</b> ${data.price} TK</p>
      </div>
    `;

    count++;
  });

  document.getElementById("orderList").innerHTML = html || "<p style='text-align:center;color:#666'>No orders found</p>";
});

</script>
</body>
</html>
