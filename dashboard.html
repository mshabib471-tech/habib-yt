<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Dashboard | Habib YT</title>
<style>
body{font-family:'Poppins',sans-serif;background:#f9fafc;padding:20px;}
.card{background:white;padding:15px;border-radius:8px;margin:10px 0;box-shadow:0 2px 5px rgba(0,0,0,0.1);}
</style>
</head>
<body>
<h2>👋 Welcome, <span id="userEmail"></span></h2>
<h3>💰 Balance: <span id="balance">0</span>৳</h3>

<h3>📦 My Orders</h3>
<div id="myOrders"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.5.0/firebase-app.js";
import { getFirestore, doc, getDoc, query, where, collection, getDocs } from "https://www.gstatic.com/firebasejs/12.5.0/firebase-firestore.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.5.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyAaLdtzOIZVYB-Bdc42CXm2T8iclWLc4o0",
  authDomain: "habib-yt.firebaseapp.com",
  projectId: "habib-yt",
  storageBucket: "habib-yt.firebasestorage.app",
  messagingSenderId: "656628491244",
  appId: "1:656628491244:web:e01ccd42bd8a2b1b4c96c9"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

onAuthStateChanged(auth, async (user) => {
  if (!user) { window.location.href = "login.html"; return; }
  document.getElementById("userEmail").textContent = user.email;

  const userRef = doc(db, "users", user.email);
  const u = await getDoc(userRef);
  if (u.exists()) document.getElementById("balance").textContent = u.data().balance || 0;

  const q = query(collection(db, "orders"), where("userEmail", "==", user.email));
  const snap = await getDocs(q);
  const container = document.getElementById("myOrders");
  container.innerHTML = "";
  snap.forEach(d=>{
    const o=d.data();
    const div=document.createElement("div");
    div.className="card";
    div.innerHTML=`${o.product} - ${o.amount}৳ <br>Status: <b>${o.status}</b>`;
    container.appendChild(div);
  });
});
</script>
</body>
</html>
