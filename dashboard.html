<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Dashboard</title>

<style>
  body {
    font-family: Poppins, sans-serif;
    background: #eef3ff;
    margin: 0;
    padding: 0;
  }

  header {
    background: #0a7cff;
    padding: 15px;
    text-align: center;
    color: white;
    font-size: 24px;
    font-weight: 600;
  }

  .card {
    background: white;
    margin: 15px;
    padding: 20px;
    border-radius: 12px;
    box-shadow: 0 3px 10px rgba(0,0,0,0.1);
    text-align: center;
  }

  .big-balance {
    font-size: 35px;
    font-weight: 700;
    color: #0066ff;
  }

  .btn {
    width: 80%;
    padding: 12px;
    margin-top: 12px;
    background: #0a7cff;
    color: white;
    border: none;
    font-size: 18px;
    border-radius: 10px;
    cursor: pointer;
  }

  .btn2 {
    width: 80%;
    padding: 12px;
    margin-top: 12px;
    background: #4a3bff;
    color: white;
    border: none;
    font-size: 18px;
    border-radius: 10px;
    cursor: pointer;
  }

  .orders-box {
    background: white;
    margin: 15px;
    padding: 15px;
    border-radius: 12px;
    box-shadow: 0 3px 10px rgba(0,0,0,0.1);
  }

  .order-item {
    border-bottom: 1px solid #ddd;
    padding: 10px 0;
  }

  .pending { color: orange; font-weight:700; }
  .approved { color: green; font-weight:700; }
  .cancelled { color: red; font-weight:700; }
</style>
</head>

<body>

<header>Dashboard</header>

<div class="card">
  <div>Your Wallet Balance</div>
  <div class="big-balance" id="wallet">0 TK</div>

  <button class="btn" onclick="location.href='add-money.html'">Add Money</button>
  <button class="btn2" onclick="location.href='index.html'">Go to Home</button>
</div>

<div class="orders-box">
  <h2>📦 My Orders</h2>
  <div id="orders">Loading...</div>
</div>

<script type="module">

import { auth, db } from "./firebase.js";
import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.5.0/firebase-auth.js";
import { collection, query, where, getDocs, doc, getDoc } from "https://www.gstatic.com/firebasejs/12.5.0/firebase-firestore.js";

onAuthStateChanged(auth, async (user) => {

  if (!user) {
    location.href = "login.html";
    return;
  }

  const uid = user.uid;

  // Load wallet
  const walletRef = await getDoc(doc(db, "wallets", uid));
  if (walletRef.exists()) {
    document.getElementById("wallet").innerText = walletRef.data().balance + " TK";
  }

  // Load orders
  const ordersBox = document.getElementById("orders");
  ordersBox.innerHTML = "Loading...";

  const q = query(collection(db, "orders"), where("user", "==", uid));
  const snap = await getDocs(q);

  if (snap.empty) {
    ordersBox.innerHTML = "No orders found!";
    return;
  }

  ordersBox.innerHTML = "";

  snap.forEach(order => {
    let d = order.data();

    let statusClass = d.status; // pending / approved / cancelled

    ordersBox.innerHTML += `
      <div class="order-item">
        <b>Serial:</b> ${order.id}<br>
        <b>Package:</b> ${d.product}<br>
        <b>Player ID:</b> ${d.uid}<br>
        <b>Price:</b> ${d.price} TK<br>
        <b>Status:</b> <span class="${statusClass}">${d.status}</span>
      </div>
    `;
  });
});
</script>

</body>
</html>
