<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard | Habib YT</title>

  <style>
    body {
      font-family: "Poppins", sans-serif;
      background: #f4f7fb;
      margin: 0;
      padding-bottom: 80px;
    }
    header {
      background: #007bff;
      padding: 15px;
      color: white;
      display: flex;
      justify-content: space-between;
    }
    .logout {
      background: white;
      color: #007bff;
      padding: 5px 12px;
      border-radius: 6px;
      border: none;
      font-weight: bold;
    }
    .container {
      background: white;
      margin: 20px auto;
      padding: 20px;
      width: 90%;
      max-width: 480px;
      border-radius: 10px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.2);
    }
    .order-item {
      background: #f8f8f8;
      padding: 10px;
      border-left: 4px solid #007bff;
      margin: 8px 0;
      border-radius: 6px;
    }
  </style>
</head>

<body>

<header>
  <h2>👤 My Account</h2>
  <button class="logout" onclick="logout()">Logout</button>
</header>

<div class="container">
  <h3>Welcome Back!</h3>

  <p><b>Email:</b> <span id="userEmail">Loading...</span></p>

  <div class="wallet">💰 Wallet Balance: <span id="walletBalance">0 BDT</span></div>

  <button onclick="window.location='add-money.html'">➕ Add Money</button>
  <button onclick="window.location='index.html'">🏠 Home</button>
</div>

<div class="container">
  <h3>🛒 Recent Orders</h3>
  <div id="recentOrders">Loading...</div>
</div>

<script type="module" src="firebase.js"></script>
<script type="module" src="app.js"></script>

<script>
  loadDashboard();
</script>

</body>
</html>
