<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Habib YT | Dashboard</title>
  <style>
    body {
      font-family: "Poppins", sans-serif;
      background:#f7f9fc;
      margin:0;
      padding-bottom:80px; /* নিচের navbar এর জন্য জায়গা */
    }
    header {
      background:#007bff;
      color:white;
      padding:15px;
      text-align:center;
      font-size:20px;
      font-weight:bold;
      box-shadow:0 2px 6px rgba(0,0,0,0.2);
    }
    .container {
      padding:20px;
      text-align:center;
    }
    .wallet {
      background:white;
      border-radius:10px;
      padding:20px;
      box-shadow:0 4px 8px rgba(0,0,0,0.1);
      max-width:350px;
      margin:20px auto;
    }
    .wallet p { font-size:16px; }
    .wallet span { color:#007bff; font-weight:bold; }
    button {
      background:#007bff;
      color:white;
      border:none;
      padding:10px 20px;
      border-radius:8px;
      cursor:pointer;
      margin:10px;
      font-weight:bold;
    }
    button:hover { background:#0056d4; }

    /* নিচের Navigation Bar */
    .bottom-nav {
      position:fixed;
      bottom:0;
      left:0;
      width:100%;
      background:white;
      border-top:1px solid #ccc;
      display:flex;
      justify-content:space-around;
      align-items:center;
      padding:8px 0;
      box-shadow:0 -2px 6px rgba(0,0,0,0.1);
    }
    .bottom-nav button {
      flex:1;
      background:none;
      color:#007bff;
      border:none;
      font-size:14px;
      cursor:pointer;
      display:flex;
      flex-direction:column;
      align-items:center;
    }
    .bottom-nav button:hover { color:#0056d4; }
    .bottom-nav i { font-size:20px; margin-bottom:3px; }
  </style>

  <!-- Font Awesome Icons -->
  <script src="https://kit.fontawesome.com/a076d05399.js" crossorigin="anonymous"></script>
</head>
<body>

<header>💼 Habib YT Dashboard</header>

<div class="container">
  <div class="wallet">
    <p><b>ইমেইল:</b> <span id="userEmail">লোড হচ্ছে...</span></p>
    <p><b>ওয়ালেট ব্যালান্স:</b> <span id="walletBalance">0 BDT</span></p>
    <button onclick="window.location.href='add-money.html'">💰 Add Money</button>
  </div>
</div>

<!-- ✅ নিচের Navigation Bar -->
<div class="bottom-nav">
  <button onclick="window.location.href='index.html'">
    <i class="fas fa-home"></i>
    Home
  </button>
  <button onclick="window.location.href='add-money.html'">
    <i class="fas fa-wallet"></i>
    Add Money
  </button>
  <button onclick="window.location.href='order.html'">
    <i class="fas fa-list"></i>
    My Orders
  </button>
  <button onclick="logout()">
    <i class="fas fa-sign-out-alt"></i>
    Logout
  </button>
</div>

<script type="module" src="firebase.js"></script>
<script type="module" src="app.js"></script>
</body>
</html>
