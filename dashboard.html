<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard | Habib YT</title>

  <style>
    body {
      font-family: "Poppins", sans-serif;
      background: #f4f7fb;
      margin: 0;
      padding-bottom: 70px;
    }
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: #007bff;
      color: white;
      padding: 12px 18px;
    }
    .logout {
      background: white;
      color: #007bff;
      padding: 6px 12px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      font-weight: bold;
    }
    .container {
      width: 90%;
      max-width: 500px;
      background: white;
      margin: 25px auto;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    }
    .wallet {
      background: #eaf1ff;
      padding: 12px;
      border-radius: 8px;
      text-align: center;
      font-weight: bold;
      color: #007bff;
    }
    .btns {
      display: flex;
      justify-content: space-around;
      margin-top: 20px;
    }
    .btns button {
      background: #007bff;
      border: none;
      padding: 12px 15px;
      border-radius: 8px;
      font-weight: bold;
      color: white;
      cursor: pointer;
    }
    .orders {
      margin-top: 20px;
      background: white;
      padding: 15px;
      border-radius: 10px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    }
    .order-item {
      background: #f8f8f8;
      padding: 8px;
      border-left: 4px solid #007bff;
      margin: 8px 0;
      border-radius: 6px;
    }
    footer {
      text-align: center;
      background: #007bff;
      color: white;
      padding: 12px;
      position: fixed;
      width: 100%;
      bottom: 0;
    }
  </style>
</head>

<body>

<header>
  <h2>👤 My Account</h2>
  <button onclick="logout()" class="logout">Logout</button>
</header>

<div class="container">
  <h3 style="text-align:center;color:#007bff;">Welcome Back!</h3>

  <p style="text-align:center;">
    <b>Email:</b> <span id="userEmail">Loading...</span>
  </p>

  <div class="wallet">💰 Wallet Balance: <span id="walletBalance">0 BDT</span></div>

  <div class="btns">
    <button onclick="window.location.href='add-money.html'">➕ Add Money</button>
    <button onclick="window.location.href='index.html'">🏠 Home</button>
  </div>
</div>

<div class="orders">
  <h3 style="color:#007bff;">🛒 Recent Orders</h3>
  <div id="recentOrders">Loading...</div>
</div>

<footer>© 2025 Habib YT — আপনার বিশ্বস্ত সহযোগী</footer>

<script type="module" src="firebase.js"></script>
<script type="module" src="app.js"></script>

</body>
</html>
