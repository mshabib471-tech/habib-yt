<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard | Habib YT</title>

<style>
  body{
    margin:0;
    font-family: Poppins, sans-serif;
    background:#f0f4ff;
    padding-bottom:120px;
  }

  header{
    background:#0a7cff;
    padding:15px;
    color:white;
    text-align:center;
    font-size:22px;
    font-weight:600;
  }

  .card{
    background:white;
    margin:15px;
    padding:20px;
    border-radius:15px;
    box-shadow:0 3px 10px rgba(0,0,0,0.1);
  }

  .balance{
    font-size:28px;
    color:#0a7cff;
    font-weight:700;
    text-align:center;
  }

  .btn{
    padding:12px 20px;
    background:#0a7cff;
    color:white;
    border:none;
    border-radius:10px;
    font-weight:600;
    font-size:17px;
    cursor:pointer;
    margin:5px;
  }

  .order{
    background:#fff;
    padding:12px;
    border-radius:10px;
    margin-top:10px;
    border-left:5px solid #999;
  }

  .pending{ border-left-color:orange; }
  .approved{ border-left-color:green; }
  .rejected{ border-left-color:red; }

  .order small{ font-size:13px;color:#555; }
</style>
</head>

<body>

<header>Dashboard</header>

<div class="card">
  <div style="font-size:17px;text-align:center;">Your Wallet Balance</div>
  <div class="balance" id="balance">0 TK</div>

  <center>
    <button class="btn" onclick="location.href='addmoney.html'">Add Money</button>
    <button class="btn" onclick="location.href='freefire.html'">Buy Diamond</button>
  </center>
</div>

<div class="card">
  <h3>📦 Recent Orders</h3>
  <div id="orders">Loading...</div>
</div>

<!-- FIREBASE -->
<script type="module">
import { auth, db } from "./firebase.js";
import { onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.5.0/firebase-auth.js";
import { 
  doc, getDoc, collection, query, where, orderBy, onSnapshot, updateDoc 
} from "https://www.gstatic.com/firebasejs/12.5.0/firebase-firestore.js";

let userUID = null;

/* LOGIN CHECK */
onAuthStateChanged(auth, async(user)=>{
  if(!user){
    location.href="login.html";
    return;
  }

  userUID = user.uid;

  /* Load Wallet */
  const walletDoc = await getDoc(doc(db, "wallets", userUID));
  if(walletDoc.exists()){
    document.getElementById("balance").innerText = walletDoc.data().balance + " TK";
  }

  /* Load Orders Live */
  loadOrders();
});

/* Load Orders */
function loadOrders(){
  const q = query(
    collection(db,"orders"),
    where("user","==",userUID),
    orderBy("created","desc")
  );

  onSnapshot(q, async(snapshot)=>{
    if(snapshot.empty){
      document.getElementById("orders").innerHTML = "No orders yet.";
      return;
    }

    let html = "";
    let sn = 1;

    for(let docu of snapshot.docs){
      let data = docu.data();

      /* Refund if rejected */
      if(data.status === "rejected" && !data.refunded){
        await refundUser(docu.id, data);
      }

      html += `
        <div class="order ${data.status}">
          <b>Order #${sn++}</b><br>
          Product: ${data.product}<br>
          UID: ${data.uid}<br>
          Price: ${data.price} TK<br>
          Payment: ${data.payment}<br>
          Status: <b>${data.status.toUpperCase()}</b><br>
          <small>${new Date(data.created.seconds * 1000).toLocaleString()}</small>
        </div>
      `;
    }

    document.getElementById("orders").innerHTML = html;
  });
}

/* Wallet Refund System */
async function refundUser(orderId, data){
  const walletRef = doc(db,"wallets",data.user);
  const walletDoc = await getDoc(walletRef);

  if(walletDoc.exists()){
    let newBal = walletDoc.data().balance + data.price;

    await updateDoc(walletRef,{
      balance:newBal
    });

    await updateDoc(doc(db,"orders",orderId),{
      refunded:true
    });
  }
}

</script>
</body>
</html>
