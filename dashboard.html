<!DOCTYPE html><html lang="bn">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Dashboard</title><style>
  body {
    font-family: Poppins, sans-serif;
    background: linear-gradient(135deg,#0a0d2b,#1b1f3b);
    margin: 0;
    padding: 0;
    color: #fff;
  }

  header {
    background: linear-gradient(90deg,#4a00e0,#8e2de2);
    padding: 18px;
    text-align: center;
    color: white;
    font-size: 26px;
    font-weight: 700;
    letter-spacing: 1px;
    box-shadow: 0 3px 15px rgba(0,0,0,0.4);
  }

  .balance-card {
    background: rgba(255,255,255,0.07);
    margin: 20px;
    padding: 25px;
    border-radius: 18px;
    backdrop-filter: blur(8px);
    box-shadow: 0 5px 20px rgba(0,0,0,0.35);
    text-align: center;
    border: 1px solid rgba(255,255,255,0.15);
  }

  .balance-title {
    font-size: 18px;
    opacity: 0.9;
  }

  .big-balance {
    font-size: 42px;
    font-weight: 800;
    margin-top: 8px;
    background: linear-gradient(90deg,#00eaff,#00ff88);
    -webkit-background-clip: text;
    color: transparent;
  }

  .btn {
    width: 90%;
    padding: 14px;
    margin-top: 14px;
    background: linear-gradient(90deg,#00ff88,#00d4ff);
    color: #000;
    border: none;
    font-size: 18px;
    font-weight: 700;
    border-radius: 12px;
    cursor: pointer;
    box-shadow: 0 4px 15px rgba(0,255,200,0.3);
  }

  .btn2 {
    width: 90%;
    padding: 14px;
    margin-top: 14px;
    background: linear-gradient(90deg,#ff6b35,#ff9935);
    color: white;
    border: none;
    font-size: 18px;
    font-weight: 700;
    border-radius: 12px;
    cursor: pointer;
    box-shadow: 0 4px 15px rgba(255,120,50,0.35);
  }

  .orders-box {
    background: rgba(255,255,255,0.07);
    margin: 15px;
    padding: 18px;
    border-radius: 16px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.3);
    border: 1px solid rgba(255,255,255,0.15);
  }

  .orders-box h2 {
    text-align: center;
    margin-bottom: 12px;
    background: linear-gradient(90deg,#00eaff,#00ff88);
    -webkit-background-clip: text;
    color: transparent;
    font-size: 22px;
  }

  .order-item {
    background: rgba(255,255,255,0.05);
    padding: 14px;
    margin: 10px 0;
    border-radius: 12px;
    font-size: 15px;
    border: 1px solid rgba(255,255,255,0.1);
  }

  .pending { color: #ffcc00; font-weight:700; }
  .approved { color: #00ff88; font-weight:700; }
  .cancelled { color: #ff4d4d; font-weight:700; }

</style></head><body><header>📊 User Dashboard</header><div class="balance-card">
  <div class="balance-title">Your Wallet Balance</div>
  <div class="big-balance" id="wallet">0 TK</div><button class="btn" onclick="location.href='add-money.html'">💰 Add Money</button> <button class="btn2" onclick="location.href='index.html'">🏠 Go to Home</button>

</div><div class="orders-box">
  <h2>📦 My Orders</h2>
  <div id="orders">Loading...</div>
</div><script type="module">

import { auth, db } from "./firebase.js";
import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.5.0/firebase-auth.js";
import { collection, query, where, getDocs, doc, getDoc } from "https://www.gstatic.com/firebasejs/12.5.0/firebase-firestore.js";

onAuthStateChanged(auth, async (user) => {

  if (!user) {
    location.href = "login.html";
    return;
  }

  const uid = user.uid;

  // Load wallet
  const walletRef = await getDoc(doc(db, "wallets", uid));
  if (walletRef.exists()) {
    document.getElementById("wallet").innerText = walletRef.data().balance + " TK";
  }

  // Load orders
  const ordersBox = document.getElementById("orders");
  ordersBox.innerHTML = "Loading...";

  const q = query(collection(db, "orders"), where("user", "==", uid));
  const snap = await getDocs(q);

  if (snap.empty) {
    ordersBox.innerHTML = "🚫 No orders found!";
    return;
  }

  ordersBox.innerHTML = "";

  snap.forEach(order => {
    let d = order.data();

    let statusClass = d.status; // pending / approved / cancelled

    ordersBox.innerHTML += `
      <div class="order-item">
        <b>Serial:</b> ${order.id}<br>
        <b>Package:</b> ${d.product}<br>
        <b>Player ID:</b> ${d.uid}<br>
        <b>Price:</b> ${d.price} TK<br>
        <b>Status:</b> <span class="${statusClass}">${d.status}</span>
      </div>
    `;
  });
});
</script></body>
</html>
