<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard | Habib YT</title>

  <style>
    body {
      margin: 0;
      padding-bottom: 80px;
      font-family: "Poppins", sans-serif;
      background: #f2f5ff;
    }

    /* Header */
    header {
      background: #0066ff;
      padding: 15px;
      color: white;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    header h2 { margin: 0; font-size: 20px; }
    .logout-btn {
      background: white;
      padding: 8px 15px;
      border-radius: 10px;
      color: #0066ff;
      font-weight: 600;
      cursor: pointer;
      border: none;
    }

    /* Box */
    .box {
      background: white;
      margin: 15px;
      padding: 20px;
      border-radius: 15px;
      box-shadow: 0 3px 8px rgba(0,0,0,0.1);
    }

    .balance {
      font-size: 22px;
      color: #0066ff;
      font-weight: bold;
    }

    .btn {
      background: #0066ff;
      padding: 10px;
      color: white;
      font-weight: 600;
      border-radius: 10px;
      display: inline-block;
      margin-top: 12px;
      cursor: pointer;
      width: 48%;
      text-align: center;
    }

    /* Order card */
    .order-card {
      background: white;
      padding: 15px;
      margin: 12px;
      border-left: 5px solid #0066ff;
      border-radius: 12px;
      box-shadow: 0 3px 8px rgba(0,0,0,0.15);
    }

    .status-pending { color: #ff9800; font-weight: bold; }
    .status-complete { color: #28a745; font-weight: bold; }

    footer {
      background: #0066ff;
      color: white;
      padding: 15px;
      text-align: center;
      position: fixed;
      width: 100%;
      bottom: 0;
      font-size: 14px;
    }
  </style>
</head>

<body>

<header>
  <h2>Dashboard</h2>
  <button class="logout-btn" onclick="logout()">Logout</button>
</header>

<!-- USER BOX -->
<div class="box">
  <h3>Welcome!</h3>
  <b>Email:</b> <span id="userEmail"></span>
  <br><br>
  <div class="balance">Wallet: <span id="wallet">0</span> BDT</div>

  <div style="display:flex; gap:4%;">
    <div class="btn" onclick="location.href='add-money.html'">Add Money</div>
    <div class="btn" onclick="location.href='index.html'">Home</div>
  </div>
</div>

<!-- ORDER LIST -->
<div class="box">
  <h3>Recent Orders</h3>
  <div id="orderList">Loading...</div>
</div>

<footer>
  © 2025 Habib YT — All Rights Reserved
</footer>


<!-- FIREBASE -->
<script type="module">
  import { auth, db } from "./firebase.js";

  import {
    signOut,
    onAuthStateChanged
  } from "https://www.gstatic.com/firebasejs/12.5.0/firebase-auth.js";

  import {
    collection, query, where, orderBy, onSnapshot,
    doc, getDoc, updateDoc
  } from "https://www.gstatic.com/firebasejs/12.5.0/firebase-firestore.js";

  let USER_ID = null;

  /* ================================
        AUTH CHECK + LOAD BALANCE
  =================================== */
  onAuthStateChanged(auth, async (user) => {
    if (!user) return location.href = "login.html";

    USER_ID = user.uid;
    document.getElementById("userEmail").innerText = user.email;

    const snap = await getDoc(doc(db, "wallets", USER_ID));
    if (snap.exists()) {
      document.getElementById("wallet").innerText = snap.data().balance;
    }

    loadOrders();
  });

  /* ================================
        SERIAL GENERATOR
  =================================== */
  function serial(id) {
    return parseInt(id.substring(0, 6).replace(/\D/g, "")) || Math.floor(Math.random() * 999999);
  }

  /* ================================
        LOAD RECENT ORDERS
  =================================== */
  function loadOrders() {
    const q = query(
      collection(db, "orders"),
      where("user", "==", USER_ID),
      orderBy("created", "desc")
    );

    onSnapshot(q, async (snapshot) => {
      if (snapshot.empty) {
        document.getElementById("orderList").innerHTML = "<p>No orders found</p>";
        return;
      }

      let html = "";

      snapshot.forEach(async (docSnap) => {
        const d = docSnap.data();
        let s = serial(docSnap.id);

        /* ================================
              AUTO REFUND WHEN COMPLETE
        =================================== */
        if (d.status === "complete" && !d.refunded) {
          if (d.payment === "wallet") {

            const walletRef = doc(db, "wallets", USER_ID);
            const w = await getDoc(walletRef);

            let newBalance = (w.data().balance || 0) + d.price;

            await updateDoc(walletRef, { balance: newBalance });
            await updateDoc(docSnap.ref, { refunded: true });

            document.getElementById("wallet").innerText = newBalance;
          }
        }

        html += `
          <div class="order-card">
            <b>Serial:</b> #${s}<br>
            <b>Date:</b> ${d.created.toDate().toLocaleString()}<br>
            <b>Package:</b> ${d.package || d.product}<br>
            <b>UID:</b> ${d.uid}<br>
            <b>Price:</b> ৳${d.price}<br>
            <b>Status:</b> 
              <span class="${d.status === 'complete' ? 'status-complete' : 'status-pending'}">
                ${d.status}
              </span>
          </div>
        `;
      });

      document.getElementById("orderList").innerHTML = html;
    });
  }

  /* ================================
        LOGOUT
  =================================== */
  window.logout = () => {
    signOut(auth);
  };
</script>

</body>
</html>
