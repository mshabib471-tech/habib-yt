<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EFootball Coin | Habib YT</title>
  <link rel="stylesheet" href="assets/style.css" />
  <script type="module" src="firebase.js"></script>
</head>
<body>
  <header>
    <h1><span>Habib</span> YT</h1>
    <div class="nav-buttons">
      <a href="index.html"><button class="login-btn">Home</button></a>
      <button id="toggle" class="toggle-btn">🌙 Dark Mode</button>
    </div>
  </header>

  <div class="order-box">
    <h2>EFootball Coin</h2>
    <div class="option" data-name="130 coin" data-price="170">130 Coin — 170৳</div>
    <div class="option" data-name="300 coin" data-price="340">300 Coin — 340৳</div>
    <div class="option" data-name="550 coin" data-price="540">550 Coin — 540৳</div>
    <div class="option" data-name="1040 coin" data-price="1030">1040 Coin — 1030৳</div>
    <button class="submit-btn" id="orderBtn">Confirm Order</button>
    <p id="msg" style="margin-top:10px;text-align:center;"></p>
  </div>

  <footer>© 2025 Habib YT — Best Service 🔥</footer>

  <script type="module">
    import { db, auth } from "./firebase.js";
    import { addDoc, collection } from "https://www.gstatic.com/firebasejs/12.5.0/firebase-firestore.js";
    import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.5.0/firebase-auth.js";

    let selected = null;
    const options = document.querySelectorAll(".option");
    const msg = document.getElementById("msg");

    options.forEach(opt => {
      opt.addEventListener("click", () => {
        options.forEach(o => o.style.background = "white");
        opt.style.background = "#d0e6ff";
        selected = { name: opt.dataset.name, price: opt.dataset.price };
      });
    });

    document.getElementById("orderBtn").addEventListener("click", async () => {
      if (!selected) return msg.textContent = "⚠️ Select a package first!";
      onAuthStateChanged(auth, async (user) => {
        if (!user) return msg.textContent = "🔑 Please login first!";
        await addDoc(collection(db, "orders"), {
          uid: user.uid,
          itemName: selected.name,
          price: selected.price,
          time: new Date().toLocaleString()
        });
        msg.textContent = "✅ Order Confirmed!";
      });
    });
  </script>
</body>
</html>
