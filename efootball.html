<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ইফুটবল কয়েন - Habib YT</title>
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body class="product-body">

  <div class="product-header">
    <a href="index.html" class="back-btn"><i class="fas fa-arrow-left"></i></a>
    <h2>ইফুটবল কয়েন</h2>
  </div>

  <div class="container">
    <div class="step"><span class="step-number">1</span> প্যাকেজ সিলেক্ট করুন</div>
    <div class="coin-grid">
      <div class="coin-card" onclick="selectPackage('Jose Mourinho', '৪৯০ TK')">
        <div class="serial">১.</div>
        <div class="coin-name">Jose Mourinho</div>
        <div class="coin-amount">+150 coin</div>
        <div class="coin-price">৪৯০ TK</div>
      </div>
      <!-- আরও ১৫টি -->
    </div>
  </div>

  <div id="checkout-bar" class="checkout-fixed" style="display:none;">
    <div class="checkout-info">
      <div>নির্বাচিত: <span id="selected-name">প্যাকেজ</span></div>
      <div class="selected-price" id="selected-price">০ TK</div>
    </div>
    <button class="buy-btn" onclick="proceedToPayment()">কিনুন</button>
  </div>

  <a href="https://wa.me/8801868461577" class="whatsapp-float"><i class="fab fa-whatsapp"></i></a>
  <script src="assets/js/script.js"></script>
</body>
</html>
