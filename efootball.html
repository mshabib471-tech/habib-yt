<!-- efootball.html -->
<!DOCTYPE html>
<html lang="bn">
<head><meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/><title>EFootball | Habib YT</title><link rel="stylesheet" href="style.css"></head>
<body>
<header class="topbar container"><div class="logo-wrap"><img src="assets/logo.png" alt=""><div><div class="site-title">EFootball</div></div></div><div><button onclick="go('index.html')" class="login-btn">Back</button></div></header>

<div class="container">
  <h3 class="center">EFootball Coin Packs</h3>
  <div class="options-grid">
    <div class="option" data-name="130 coin" data-price="170">130 coin<br><span class="small">৳170</span></div>
    <div class="option" data-name="300 coin" data-price="340">300 coin<br><span class="small">৳340</span></div>
    <div class="option" data-name="550 coin" data-price="540">550 coin<br><span class="small">৳540</span></div>
    <div class="option" data-name="1040 coin" data-price="1030">1040 coin<br><span class="small">৳1030</span></div>
  </div>

  <div class="card-small" style="margin-top:12px;">
    <label class="small">Account / ID</label>
    <input id="acc" placeholder="Account ID / Username" />
    <button id="orderBtn" class="btn">Order Now</button>
  </div>
</div>

<nav class="bottom-nav">
  <div onclick="go('index.html')">🏠</div>
  <div onclick="go('add-money.html')">➕</div>
  <div onclick="go('order.html')">📦</div>
  <div onclick="go('dashboard.html')">👤</div>
</nav>

<script type="module">
  import { auth, db, ensureUserDoc } from './app.js';
  import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.5.0/firebase-auth.js";
  import { collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/12.5.0/firebase-firestore.js";

  let sel=null;
  document.querySelectorAll('.option').forEach(o=>o.addEventListener('click', ()=>{document.querySelectorAll('.option').forEach(x=>x.classList.remove('selected'));o.classList.add('selected');sel={name:o.dataset.name,price:parseFloat(o.dataset.price)};}));

  document.getElementById('orderBtn').addEventListener('click', () => {
    const acc = document.getElementById('acc').value.trim();
    if (!sel) return alert('প্যাকেজ সিলেক্ট করুন');
    if (!acc) return alert('Account ID দিন');

    onAuthStateChanged(auth, async (user) => {
      if (!user) return alert('Login করুন');
      await ensureUserDoc(user);
      await addDoc(collection(db,'orders'), {
        userEmail: user.email,
        product: 'EFootball - ' + sel.name,
        amount: sel.price,
        details: 'Account: ' + acc,
        status: 'pending',
        createdAt: serverTimestamp()
      });
      alert('✅ Order submitted');
      window.location.href='dashboard.html';
    });
  });
</script>
</body>
</html>
