<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>অর্ডার হিস্ট্রি - Habib YT</title>
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
  <div class="container">
    <h2>অর্ডার হিস্ট্রি</h2>
    <div id="orders"></div>
  </div>
  <script>
    const orders = JSON.parse(localStorage.getItem('orders')) || [];
    const list = document.getElementById('orders');
    orders.forEach(o => {
      list.innerHTML += <div class="order-item"><b>${o.name}</b> - ${o.price}৳ <span>${o.status}</span></div>;
    });
  </script>
</body>
</html>
