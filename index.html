        overflow:hidden;
        text-align:center;

        transition:0.25s;
    }
    .product:hover{
        transform:scale(1.06);
        box-shadow:0 10px 25px rgba(0,255,136,0.3);
    }
    .product img{

        height:85px;

    .order-item{

        padding:12px;

        border-radius:12px;

        justify-content:space-between;

    }

        bottom:0;
        left:0;right:0;
        background:#000;
        border-top:4px solid #00ff88;
        display:flex;
        justify-content:space-around;
        padding:14px 0;
        z-index:999;
    }
    .nav a{
        color:#fff;
        text-decoration:none;
        text-align:center;
        font-size:13px;
    }
    .nav i{
        font-size:24px;

        margin-bottom:5px;
