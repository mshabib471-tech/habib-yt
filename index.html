<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Habib Topup - Fast & Secure Topup Service</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #00ff88;
      --secondary: #00d0ff;
      --accent: #6600ff;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      position: relative;
      overflow: hidden;
    }
    .bg-glow {
      position: absolute;
      width: 500px;
      height: 500px;
      background: radial-gradient(circle, rgba(0,255,136,0.3) 0%, transparent 70%);
      border-radius: 50%;
      top: -150px;
      left: -150px;
      animation: float 15s infinite;
    }
    .container {
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-radius: 24px;
      border: 1px solid rgba(255, 255, 255, 0.18);
      padding: 50px 35px;
      width: 90%;
      max-width: 430px;
      text-align: center;
      box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
      position: relative;
      z-index: 2;
    }
    .logo {
      font-size: 48px;
      font-weight: 800;
      background: linear-gradient(45deg, var(--primary), var(--secondary), var(--accent));
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 8px;
    }
    .subtitle {
      font-size: 15px;
      opacity: 0.85;
      margin-bottom: 45px;
    }
    .btn {
      width: 100%;
      padding: 16px;
      margin: 14px 0;
      border: none;
      border-radius: 14px;
      font-size: 17px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.4s ease;
      position: relative;
      overflow: hidden;
    }
    .btn-login {
      background: linear-gradient(45deg, #00ff88, #00d0ff);
      color: #000;
      box-shadow: 0 8px 25px rgba(0, 255, 136, 0.4);
    }
    .btn-register {
      background: rgba(255, 255, 255, 0.12);
      color: white;
      border: 1.5px solid rgba(255, 255, 255, 0.25);
    }
    .btn:hover {
      transform: translateY(-5px);
      box-shadow: 0 15px 35px rgba(0, 255, 255, 0.5);
    }
    .footer {
      margin-top: 50px;
      font-size: 13px;
      opacity: 0.7;
    }
    @keyframes float {
      0%, 100% { transform: translateY(0) rotate(0deg); }
      50% { transform: translateY(-30px) rotate(5deg); }
    }
  </style>
</head>
<body>

  <div class="bg-glow"></div>

  <div class="container">
    <h1 class="logo">Habib Topup</h1>
    <p class="subtitle">Instant Diamond • UC • RP Topup Service 2025</p>

    <button class="btn btn-login">Login</button>
    <button class="btn btn-register">Register</button>

    <div class="footer">
      © 2025 Habib Topup • Trusted by 50K+ Gamers
    </div>
  </div>

</body>
</html>
