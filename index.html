<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Habib YT - দ্রুত ও নিরাপদ টপ-আপ</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:'Poppins',sans-serif;
  background:linear-gradient(135deg,#6366f1,#8b5cf6,#a78bfa);
  min-height:100vh;color:#fff
}
.container{
  max-width:480px;margin:0 auto;min-height:100vh;
  background:#fff;border-radius:0;overflow:hidden;
  box-shadow:0 0 50px rgba(99,102,241,0.4)
}

/* Header – তোর লোগো স্টাইল */
header{
  background:linear-gradient(135deg,#4f46e5,#7c3aed);
  padding:40px 20px 50px;text-align:center;
  clip-path:ellipse(100% 75% at 50% 25%)
}
.logo-circle{
  width:110px;height:110px;background:#fff;border-radius:50%;
  margin:0 auto 15px;display:flex;align-items:center;justify-content:center;
  font-size:52px;font-weight:900;color:#4f46e5;box-shadow:0 10px 30px rgba(0,0,0,0.3)
}
header h1{font-size:38px;font-weight:900;margin:10px 0}
header p{font-size:19px;opacity:0.95}

/* Services Grid */
.services{
  display:grid;grid-template-columns:1fr 1fr;gap:20px;
  padding:0 20px;margin-top:-40px;position:relative;z-index:2
}
.card{
  background:#fff;border-radius:28px;overflow:hidden;
  box-shadow:0 15px 40px rgba(0,0,0,0.18);transition:all 0.4s;
  text-align:center;cursor:pointer
}
.card:hover{
  transform:translateY(-18px) scale(1.06);
  box-shadow:0 30px 70px rgba(99,102,241,0.5)
}
.card img{width:100%;height:150px;object-fit:cover}
.card h3{
  padding:18px 10px;font-size:18px;font-weight:800;
  background:linear-gradient(135deg,#4f46e5,#7c3aed);color:#fff
}

/* About Me Box */
.about-box{
  margin:50px 25px 30px;padding:35px;
  background:linear-gradient(135deg,#ff6b6b,#ffa726);
  border-radius:35px;text-align:center;
  box-shadow:0 25px 60px rgba(255,107,107,0.5);
  border:5px solid rgba(255,255,255,0.3)
}
.about-box h3{font-size:32px;font-weight:900;margin-bottom:12px}
.about-box p{font-size:19px;margin-bottom:25px}
.visit-btn{
  display:inline-block;padding:18px 60px;background:#fff;color:#e63946;
  font-size:22px;font-weight:900;border-radius:50px;text-decoration:none;
  box-shadow:0 15px 40px rgba(0,0,0,0.3);transition:0.4s
}
.visit-btn:hover{
  transform:scale(1.12);background:#e63946;color:#fff
}

/* Support */
.support{
  margin:20px 25px 80px;padding:30px;
  background:rgba(255,255,255,0.18);border-radius:30px;
  text-align:center;backdrop-filter:blur(15px)
}
.support a{
  display:inline-block;padding:16px 45px;margin:10px;
  border-radius:50px;font-weight:900;font-size:18px;
  color:#fff;transition:0.3s
}
.telegram{background:#0088cc;box-shadow:0 12px 35px rgba(0,136,204,0.5)}
.whatsapp{background:#25d366;box-shadow:0 12px 35px rgba(37,211,102,0.5)}
.support a:hover{transform:scale(1.15)}

/* নিচের নেভিগেশন — এবার পুরাই প্রিমিয়াম! */
.nav{
  position:fixed;bottom:15px;left:50%;transform:translateX(-50%);
  background:rgba(255,255,255,0.22);backdrop-filter:blur(25px);
  border-radius:60px;padding:16px 20px;
  display:flex;gap:25px;z-index:999;
  box-shadow:0 15px 40px rgba(0,0,0,0.3);
  border:3px solid rgba(255,255,255,0.3)
}
.nav a{
  width:68px;height:68px;background:rgba(255,255,255,0.25);
  border-radius:50%;display:flex;align-items:center;justify-content:center;
  font-size:30px;color:#fff;transition:all 0.4s;
  box-shadow:0 10px 30px rgba(0,0,0,0.3)
}
.nav a:hover{
  background:#4f46e5;transform:scale(1.2) translateY(-10px);
  box-shadow:0 20px 50px rgba(79,70,229,0.7)
}
.nav a.active{
  background:#4f46e5;box-shadow:0 0 35px #4f46e5;
  transform:scale(1.15)
}
</style>
</head>
<body>

<div class="container">

  <!-- Header -->
  <header>
    <div class="logo-circle">HY</div>
    <h1>Habib YT</h1>
    <p>দ্রুত • নিরাপদ • বিশ্বস্ত</p>
  </header>

  <!-- Services -->
  <div class="services">
    <div class="card" onclick="location.href='freefire.html'">
      <img src="assets/ff.jpg" alt="Free Fire">
      <h3>Free Fire</h3>
    </div>
    <div class="card" onclick="location.href='efootball.html'">
      <img src="assets/efootball.jpg" alt="eFootball">
      <h3>eFootball</h3>
    </div>
    <div class="card" onclick="location.href='like-follower.html'">
      <img src="assets/like.jpg" alt="Like Follower">
      <h3>Like & Followers</h3>
    </div>
    <div class="card" onclick="location.href='mobile-accessories.html'">
      <img src="assets/accessories.jpg" alt="Accessories">
      <h3>Accessories</h3>
    </div>
  </div>

  <!-- About Me Box -->
  <div class="about-box">
    <h3>About Me</h3>
    <p>আমি হাবিবুর রহমান — তোমাদের ভাই</p>
    <a href="https://habib-web.vercel.app" target="_blank" class="visit-btn">Visit Portfolio</a>
  </div>

  <!-- Support -->
  <div class="support">
    <h2>24/7 Support</h2>
    <a href="https://t.me/H_A_B_I_B_Top_1" class="telegram">Telegram</a>
    <a href="https://wa.me/8801868461577" class="whatsapp">WhatsApp</a>
  </div>

</div>

<!-- নিচের নেভিগেশন — সুপার প্রিমিয়াম! -->
<div class="nav">
  <a href="index.html" class="active">Home</a>
  <a href="dashboard.html">Dashboard</a>

  <a href="login.html">Login</a>

</body>
</html>
