<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">

<title>Habib YT — দ্রুত ও নিরাপদ টপ-আপ</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:'Poppins',sans-serif;
  background:linear-gradient(135deg,#667eea,#764ba2);
  color:#fff;min-height:100vh
}
.container{
  max-width:480px;margin:0 auto;background:#fff;
  min-height:100vh;border-radius:25px 25px 0 0;
  overflow:hidden;box-shadow:0 0 60px rgba(102,126,234,0.5);
  padding-bottom:100px
}

/* Header – প্রিমিয়াম */
header{
  background:linear-gradient(135deg,#5a67d8,#4c51bf);
  padding:22px 20px;color:#fff;text-align:center;
  box-shadow:0 10px 30px rgba(90,103,216,0.4)
}
.logo img{width:70px;height:70px;border-radius:50%;border:5px solid rgba(255,255,255,0.3)}
header h1{font-size:32px;font-weight:900;margin:10px 0 5px}
header p{font-size:17px;opacity:0.9}

/* Hero Cards */
.services{
  display:grid;grid-template-columns:1fr 1fr;gap:18px;padding:30px 20px
}
.card{
  background:#fff;border-radius:25px;overflow:hidden;
  box-shadow:0 15px 40px rgba(0,0,0,0.15);transition:0.4s;
  cursor:pointer;color:#333
}
.card:hover{transform:translateY(-15px) scale(1.05);box-shadow:0 30px 70px rgba(102,126,234,0.4)}
.card img{width:100%;height:140px;object-fit:cover}
.card h3{
  padding:16px 8px;text-align:center;font-size:17px;font-weight:800;
  background:linear-gradient(135deg,#667eea,#764ba2);color:#fff
}

/* About Me Box – আগুন লাগানো */
.about-box{
  margin:40px 25px;padding:35px;
  background:linear-gradient(135deg,#ff6b6b,#ffa500);
  border-radius:30px;text-align:center;color:#fff;
  box-shadow:0 25px 60px rgba(255,107,107,0.5);
  border:4px solid rgba(255,255,255,0.3)
}
.about-box h3{font-size:30px;font-weight:900;margin-bottom:12px}
.about-box p{font-size:18px;margin-bottom:22px}
.about-btn{
  display:inline-block;padding:18px 55px;background:#fff;color:#e63946;
  font-size:21px;font-weight:900;border-radius:50px;
  text-decoration:none;box-shadow:0 12px 35px rgba(0,0,0,0.3);
  transition:0.4s
}
.about-btn:hover{transform:scale(1.1);background:#e63946;color:#fff}

/* Support */
.support{
  margin:40px 25px;padding:28px;background:rgba(255,255,255,0.15);
  border-radius:28px;text-align:center;backdrop-filter:blur(15px);
  border:2px solid rgba(255,255,255,0.2)
}
.support a{
  display:inline-block;padding:16px 40px;margin:10px;border-radius:50px;
  font-weight:900;font-size:17px;color:#fff;transition:0.3s
}
.telegram{background:#0088cc;box-shadow:0 10px 30px rgba(0,136,204,0.5)}
.whatsapp{background:#25d366;box-shadow:0 10px 30px rgba(37,211,102,0.5)}
.support a:hover{transform:scale(1.1)}

/* Footer */
footer{
  text-align:center;padding:25px;color:#ccc;font-weight:700;background:#1a1a2e
}

/* নিচের নেভিগেশন — এবার পুরাই আগুন! */
.nav{
  position:fixed;bottom:0;left:0;width:100%;
  background:rgba(255,255,255,0.12);backdrop-filter:blur(20px);
  border-top:4px solid #667eea;padding:14px 0;
  display:flex;justify-content:space-around;z-index:999;
  box-shadow:0 -10px 40px rgba(102,126,234,0.4)
}
.nav a{
  color:#fff;font-size:28px;padding:12px 20px;border-radius:50%;
  background:rgba(255,255,255,0.15);width:65px;height:65px;
  display:flex;align-items:center;justify-content:center;
  transition:0.4s;box-shadow:0 8px 25px rgba(0,0,0,0.3)
}
.nav a:hover{
  background:#667eea;transform:scale(1.25);
  box-shadow:0 15px 40px rgba(102,126,234,0.6)
}
.nav a.active{background:#667eea;box-shadow:0 0 30px #667eea}
</style>
</head>

    <div class="card" onclick="location.href='like-follower.html'"><img src="assets/like.jpg"><h3>Like & Followers</h3></div>
    <div class="card" onclick="location.href='mobile-accessories.html'"><img src="assets/accessories.jpg"><h3>Accessories</h3></div>

    <a href="https://habib-web.vercel.app" target="_blank" class="about-btn">Visit Portfolio</a>

  <div class="support">
    <h2>24/7 Support</h2>
    <a href="https://t.me/H_A_B_I_B_Top_1" class="telegram">Telegram</a>
    <a href="https://wa.me/8801868461577" class="whatsapp">WhatsApp</a>
  </div>

  <footer>
    © Habibur Rahman<br><small>All Rights Reserved 2025</small>
  </footer>

</div>
