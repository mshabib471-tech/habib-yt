<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Habib Topup - Free Fire Diamond BD</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{
            font-family:'Poppins',sans-serif;
            background:linear-gradient(135deg,#0f0c29,#302b63,#0f0c29);
            color:#fff;
            min-height:100vh;
            padding-bottom:100px;
        }
        .header{
            padding:20px 15px;
            text-align:center;
            background:rgba(0,0,0,0.3);
        }
        .logo{
            font-size:48px;
            font-weight:900;
            background:linear-gradient(45deg,#00ff88,#00d0ff);
            -webkit-background-clip:text;
            background-clip:text;
            -webkit-text-fill-color:transparent;
            display:inline-block;
        }
        .btns{
            margin-top:15px;
            display:flex;
            gap:15px;
            justify-content:center;
        }
        .btn-login{
            background:linear-gradient(45deg,#00ff88,#00ffc4);
            color:#000;
            padding:12px 32px;
            border-radius:50px;
            font-weight:800;
            font-size:18px;
            border:none;
        }
        .btn-reg{
            background:transparent;
            color:#fff;
            border:2px solid #fff;
            padding:10px 30px;
            border-radius:50px;
            font-weight:700;
            font-size:18px;
        }
        .notice{
            margin:20px 15px;
            background:linear-gradient(45deg,#ff006e,#8b00ff);
            padding:18px;
            border-radius:20px;
            font-weight:600;
            text-align:center;
            box-shadow:0 10px 30px rgba(255,0,110,0.4);
        }
        .banner{
            margin:30px 15px 10px;
            background:linear-gradient(45deg,#1a0033,#330066);
            padding:20px;
            border-radius:20px;
            text-align:center;
            font-size:32px;
            font-weight:900;
            color:#00ff88;
        }
        .games{
            display:grid;
            grid-template-columns:repeat(3,1fr);
            gap:20px;
            padding:0 15px;
            margin-top:20px;
        }
        .game-card{
            background:rgba(255,255,255,0.1);
            backdrop-filter:blur(10px);
            border-radius:20px;
            padding:15px;
            text-align:center;
            border:1px solid rgba(255,255,255,0.2);
            transition:0.4s;
        }
        .game-card:hover{
            transform:translateY(-10px);
            box-shadow:0 20px 40px rgba(0,255,136,0.3);
        }
        .game-card img{
            width:70px;
            transition:0.4s;
        }
        .game-card:hover img{transform:scale(0.9)}

        /* বটম নেভিগেশন – একদম তোর স্ক্রিনশটের মতো + সুন্দর */
        .bottom-nav{
            position:fixed;
            bottom:0;
            left:0;
            right:0;
            background:linear-gradient(to top,#000,#1a0033);
            border-top:4px solid #ffd700;
            padding:15px 0;
            display:flex;
            justify-content:space-around;
            z-index:9999;
            box-shadow:0 -10px 30px rgba(255,215,0,0.4);
        }
        .nav-item{
            text-align:center;
            color:#fff;
            text-decoration:none;
            flex:1;
        }
        .nav-item i{
            font-size:28px;
            display:block;
            margin-bottom:5px;
        }
        .nav-item span{
            font-size:12px;
            font-weight:600;
        }
        .nav-item.active, .nav-item:hover{
            color:#00ff88;
        }
        .nav-item.active i{
            color:#00ff88;
            text-shadow:0 0 15px #00ff88;
        }
    </style>
</head>
<body>

<div class="header">
    <div class="logo">Habib<br>Topup</div>
    <div class="btns">
        <button class="btn-login">Login</button>
        <button class="btn-reg">Register</button>
    </div>
</div>

<div class="notice">
    কারও মোবাইল একাউন্ট থেকে চুরি করে অর্ডার করবেন না।
</div>

<div class="banner">
    FREE FIRE TOPUP
</div>

<div class="games">
    <a href="freefire.html" class="game-card">
        <img src="https://i.ibb.co.com/ff-bd.png" alt="Free Fire BD">
        <p>Free Fire BD</p>
    </a>
    <a href="weekly.html" class="game-card">
        <img src="https://i.ibb.co.com/weekly.png" alt="Weekly">
        <p>Weekly Pass</p>
    </a>
    <a href="monthly.html" class="game-card">
        <img src="https://i.ibb.co.com/combo.png" alt="Monthly">
        <p>Monthly</p>
    </a>
    <a href="like.html" class="game-card">
        <img src="https://i.ibb.co.com/like.png" alt="Like">
        <p>Like/Follow</p>
    </a>
    <a href="pubg.html" class="game-card">
        <img src="https://i.ibb.co.com/pubg.png" alt="PUBG">
        <p>PUBG UC</p>
    </a>
    <a href="unipin.html" class="game-card">
        <img src="https://i.ibb.co.com/unipin.png" alt="UniPin">
        <p>UniPin</p>
    </a>
</div>

<!-- বটম নেভিগেশন – একদম তোর স্ক্রিনশটের মতো -->
<div class="bottom-nav">
    <a href="/" class="nav-item active">
        <i class="fas fa-home"></i>
        <span>হোম</span>
    </a>
    <a href="#topup" class="nav-item">
        <i class="fas fa-gem"></i>
        <span>টপআপ</span>
    </a>
    <a href="account.html" class="nav-item">
        <i class="fas fa-user"></i>
        <span>অ্যাকাউন্ট</span>
    </a>
    <a href="support.html" class="nav-item">
        <i class="fas fa-headset"></i>
        <span>সাপোর্ট</span>
    </a>
</div>

</body>
</html>
