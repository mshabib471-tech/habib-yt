<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Habib YT - Auto Delivery</title>
  <link rel="stylesheet" href="assets/style.css" />
  <link rel="icon" href="https://cdn-icons-png.flaticon.com/512/1051/1051309.png" />
  <script src="https://kit.fontawesome.com/7a9e4a7f9b.js" crossorigin="anonymous"></script>
</head>
<body>

  <!-- 🔸 Header -->
  <header class="header">
    <div class="menu-btn">
      <i class="fas fa-bars"></i>
    </div>
    <h1 class="logo-text">Habib YT</h1>
    <a href="#" class="login-btn">লগইন</a>
  </header>

  <!-- 🔸 Hero Section -->
  <section class="hero">
    <h2>Habib YT – Auto Delivery</h2>
    <p>বাংলাদেশের দ্রুত ও নিরাপদ গেম টপ-আপ সার্ভিস</p>
    <a href="https://facebook.com" target="_blank" class="fb-btn">Follow on Facebook</a>
  </section>

  <!-- 🔸 Service Cards -->
  <section class="services">
    <div class="card">
      <img src="https://cdn-icons-png.flaticon.com/512/5693/5693385.png" alt="diamond" />
      <h3>Free Fire Top-Up [BD]</h3>
      <p>Instant delivery, BD server only</p>
      <a href="#" class="btn">Go</a>
    </div>

    <div class="card">
      <img src="https://cdn-icons-png.flaticon.com/512/533/533489.png" alt="football" />
      <h3>eFootball Coin</h3>
      <p>Trusted & instant delivery</p>
      <a href="#" class="btn">Go</a>
    </div>

    <div class="card">
      <img src="https://cdn-icons-png.flaticon.com/512/854/854866.png" alt="service" />
      <h3>Mobile Servicing</h3>
      <p>Shop view coming soon</p>
      <a href="#" class="btn">Shop</a>
    </div>
  </section>

  <!-- 🔸 Footer -->
  <footer>
    <p>© <span id="year"></span> Habib YT — Best Service 💎</p>
  </footer>

  <script>
    document.getElementById("year").textContent = new Date().getFullYear();
  </script>

</body>
</html>
