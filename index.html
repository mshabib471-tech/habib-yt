<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Habib Topup - Free Fire Diamond & Game Topup BD</title>
    <link rel="shortcut icon" href="https://i.ibb.co.com/0jY7Y7K/favicon.png">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

    <style>
        :root {
            --primary: #00ff88;
            --secondary: #00d0ff;
            --dark: #0f0c29;
            --glass: rgba(255,255,255,0.09);
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            color: white;
            padding-bottom: 100px; /* বটম নেভের জন্য জায়গা */
        }

        /* Header */
        .header {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(15px);
            border-bottom: 1px solid rgba(255,255,255,0.15);
            position: fixed;
            top: 0; left: 0; right: 0;
            z-index: 1000;
        }
        .logo {
            font-size: 34px;
            font-weight: 800;
            background: linear-gradient(45deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Notice */
        .notice {
            background: linear-gradient(45deg, #ff006e, #8338ec);
            border-radius: 18px;
            margin-top: 90px;
        }

        /* Game Card */
        .game-card {
            background: var(--glass);
            backdrop-filter: blur(12px);
            border-radius: 20px;
            padding: 18px;
            transition: 0.4s;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .game-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 20px 40px rgba(0,255,136,0.3);
        }

        /* Bottom Navigation – এখন আর উপরে উঠবে না + সুন্দর */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(to top, #000, #1a0033);
            border-top: 3px solid #ffd700;
            padding: 14px 0 10px;
            display: flex;
            justify-content: space-around;
            z-index: 9999;
            box-shadow: 0 -10px 30px rgba(255,215,0,0.4);
        }
        .bottom-nav a {
            color: #fff;
            text-decoration: none;
            text-align: center;
            flex: 1;
        }
        .bottom-nav i {
            font-size: 28px;
            display: block;
            margin-bottom: 6px;
            background: linear-gradient(45deg, #ffd700, #ff8c00);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .bottom-nav span {
            font-size: 11px;
            font-weight: 600;
        }
        .bottom-nav a.active i,
        .bottom-nav a:hover i {
            background: linear-gradient(45deg, #00ff88, #00d0ff);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            transform: scale(1.2);
        }
    </style>
</head>
<body>

<!-- Header -->
<div class="header shadow-lg">
    <div class="container py-3">
        <div class="d-flex justify-content-between align-items-center">
            <h1 class="logo m-0">Habib Topup</h1>
            <div class="d-flex gap-3 align-items-center">
                <a href="login.html" class="btn btn-success rounded-pill px-4">Login</a>
                <a href="register.html" class="btn btn-outline-light rounded-pill px-4">Register</a>
            </div>
        </div>
    </div>
</div>

<div class="container">

    <div class="alert notice alert-dismissible fade show mt-5">

        <strong>Notice:</strong> 24/7 AI Auto Delivery • 100% Trusted • Instant
    </div>

    <!-- Carousel -->
    <div id="carousel" class="carousel slide rounded-4 shadow-lg mb-5" data-bs-ride="carousel">
        <div class="carousel-inner">
            <div class="carousel-item active"><img src="https://i.ibb.co.com/banner1.png" class="d-block w-100 rounded-4" alt="banner"></div>
            <div class="carousel-item"><img src="https://i.ibb.co.com/banner2.png" class="d-block w-100 rounded-4" alt="banner"></div>
            <div class="carousel-item"><img src="https://i.ibb.co.com/banner3.png" class="d-block w-100 rounded-4" alt="banner"></div>
        </div>
        <button class="carousel-control-prev" data-bs-target="#carousel" data-bs-slide="prev"><span class="carousel-control-prev-icon"></span></button>
        <button class="carousel-control-next" data-bs-target="#carousel" data-bs-slide="next"><span class="carousel-control-next-icon"></span></button>
    </div>

    <!-- Free Fire Section -->
    <h3 class="text-center fw-bold mb-4" id="topup">FREE FIRE TOPUP</h3>
    <div class="row row-cols-3 row-cols-md-6 g-3 mb-5">
        <div class="col"><a href="freefire.html"><div class="game-card text-center"><img src="https://i.ibb.co.com/ff-bd.png" class="img-fluid"><p class="small mt-2">Free Fire BD</p></div></a></div>
        <div class="col"><a href="unipin.html"><div class="game-card text-center"><img src="https://i.ibb.co.com/unipin.png" class="img-fluid"><p class="small mt-2">UniPin</p></div></a></div>
        <div class="col"><a href="weekly.html"><div class="game-card text-center"><img src="https://i.ibb.co.com/weekly.png" class="img-fluid"><p class="small mt-2">Weekly</p></div></a></div>
        <div class="col"><a href="monthly.html"><div class="game-card text-center"><img src="https://i.ibb.co.com/combo.png" class="img-fluid"><p class="small mt-2">Monthly</p></div></a></div>
        <div class="col"><a href="pubg.html"><div class="game-card text-center"><img src="https://i.ibb.co.com/pubg.png" class="img-fluid"><p class="small mt-2">PUBG UC</p></div></a></div>
        <div class="col"><a href="like.html"><div class="game-card text-center"><img src="https://i.ibb.co.com/like.png" class="img-fluid"><p class="small mt-2">Like/Follow</p></div></a></div>
    </div>

    <!-- Recent Orders -->
    <div class="text-center my-5">
        <h4>Recent Orders <i class="fas fa-sync text-success"></i></h4>
        <div class="p-3 rounded-4" style="background:var(--glass);backdrop-filter:blur(10px);">
            <small>1234*** → 520 Diamond → Success<br>
            5678*** → Weekly Pass → Success<br>
            9012*** → 1000 Like → Success</small>
        </div>
    </div>

</div>

<!-- সুন্দর বটম নেভিগেশন – এখন আর উপরে উঠবে না -->
<div class="bottom-nav d-block d-md-none">
    <a href="index.html" class="active"><i class="fas fa-home"></i><span>Home</span></a>
    <a href="freefire.html"><i class="fas fa-gem"></i><span>Free Fire</span></a>
    <a href="pubg.html"><i class="fas fa-crosshairs"></i><span>PUBG</span></a>
    <a href="login.html"><i class="fas fa-user"></i><span>Account</span></a>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
