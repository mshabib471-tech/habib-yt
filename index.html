<style>
  body { margin:0; overflow-x:hidden; background:#000; color:#fff; font-family:'Rajdhani',sans-serif; cursor:none; }
  .cursor { position:fixed; width:40px; height:40px; border:2px solid #00ffff; border-radius:50%; pointer-events:none; z-index:99999; mix-blend-mode:difference; transform:translate(-50%,-50%); transition:all 0.05s; }
  .cursor::after { content:''; position:absolute; width:12px; height:12px; background:#ff00ff; border-radius:50%; top:50%; left:50%; transform:translate(-50%,-50%); }
  .grain { position:fixed; inset:0; pointer-events:none; background:url('https://grainy-gradients.vercel.app/noise.svg'); opacity:0.12; z-index:1; }
  .glitch { position:relative; font-family:'Orbitron',sans-serif; }
  .glitch::before,.glitch::after{content:attr(data-text);position:absolute;top:0;left:0;width:100%;height:100%;}
  .glitch::before{animation:glitch1 0.6s infinite; color:#00ffff; clip-path:polygon(0 0,100% 0,100% 40%,0 40%);}
  .glitch::after{animation:glitch2 0.6s infinite; color:#ff00ff; clip-path:polygon(0 60%,100% 60%,100% 100%,0 100%);}
  @keyframes glitch1{0%,100%{transform:translate(0)}20%{transform:translate(-8px,8px)}40%{transform:translate(8px,-8px)}}
  @keyframes glitch2{0%,100%{transform:translate(0)}60%{transform:translate(-8px,-8px)}80%{transform:translate(8px,8px)}}
  .neon-text { text-shadow: 0 0 20px #00ffff, 0 0 40px #00ffff, 0 0 80px #00ffff; }
</style>
</head>
<body class="relative">

<div class="cursor" id="cursor"></div>
<div class="grain"></div>
<canvas id="bg"></canvas>

    <p class="text-3xl mt-8 tracking-widest">FULL-STACK SORCERER × 3D WIZARD × CYBER GOD</p>

    <!-- Social Icons -->
    <div class="mt-16 flex justify-center gap-8 flex-wrap">
      <a href="https://www.facebook.com/share/1A8xKKdbec/" target="_blank" class="w-20 h-20 rounded-full bg-cyan-500/20 backdrop-blur-xl border-2 border-cyan-500 hover:bg-cyan-500 hover:scale-125 hover:rotate-12 transition neon-text text-3xl flex items-center justify-center">FB</a>
      <a href="https://instagram.com/md__habibur_rahman" target="_blank" class="w-20 h-20 rounded-full bg-pink-500/20 backdrop-blur-xl border-2 border-pink-500 hover:bg-pink-500 hover:scale-125 hover:-rotate-12 transition text-3xl flex items-center justify-center">IG</a>
      <a href="https://tiktok.com/@habibur_._rahman" target="_blank" class="w-20 h-20 rounded-full bg-gradient-to-r from-purple-500 to-pink-500 backdrop-blur-xl border-2 border-purple-500 hover:scale-125 transition text-3xl flex items-center justify-center">TT</a>
      <a href="https://youtube.com/@h_a_b_i_b-yt" target="_blank" class="w-20 h-20 rounded-full bg-red-500/20 backdrop-blur-xl border-2 border-red-500 hover:bg-red-500 hover:scale-125 transition text-3xl flex items-center justify-center">YT</a>
      <a href="https://wa.me/01868461577" target="_blank" class="w-20 h-20 rounded-full bg-green-500/20 backdrop-blur-xl border-2 border-green-500 hover:bg-green-500 hover:scale-125 transition text-3xl flex items-center justify-center">WA</a>
    </div>

    <div class="mt-20">
      <a href="#projects" class="px-16 py-6 bg-gradient-to-r from-cyan-500 to-pink-500 rounded-full text-3xl font-bold hover:shadow-2xl hover:shadow-pink-500/80 transition animate-pulse border-4 border-purple-500">
        ENTER THE MATRIX

<!-- Rest of the madness -->
<section id="projects" class="min-h-screen grid grid-cols-1 md:grid-cols-3 gap-10 p-20">

  </div>
  <div class="group relative overflow-hidden rounded-3xl bg-gradient-to-br from-cyan-900/50 to-black border border-cyan-500/50 backdrop-blur-xl hover:scale-105 transition">
    <img src="https://via.placeholder.com/600x400/004466/ff00ff?text=3D+WORLD" class="w-full h-full object-cover group-hover:scale-110 transition">

<footer class="text-center py-24 text-3xl bg-black/80">

<script>
  // Custom Cursor
  const cursor = document.getElementById('cursor');
  document.addEventListener('mousemove', e => {
    cursor.style.left = e.clientX + 'px';
    cursor.style.top = e.clientY + 'px';
  });

  // 3D Background
  const scene = new THREE.Scene();
  const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
  const renderer = new THREE.WebGLRenderer({canvas: document.getElementById('bg'), alpha: true});
  renderer.setSize(window.innerWidth, window.innerHeight);
  camera.position.z = 5;

  const geometry = new THREE.TorusKnotGeometry(1, 0.3, 128, 16);
  const material = new THREE.MeshBasicMaterial({color: 0x00ffff, wireframe: true});
  const torus = new THREE.Mesh(geometry, material);
  scene.add(torus);

  function animate() {
    requestAnimationFrame(animate);
    torus.rotation.x += 0.01;
    torus.rotation.y += 0.01;
    renderer.render(scene, camera);
  }
  animate();

  // GSAP Magic
  gsap.from("#avatar", {y: -300, rotation: 360, duration: 2, ease: "bounce.out"});
  gsap.from("h1", {opacity: 0, scale: 0.5, duration: 2, delay: 0.8});
</script>
</body>
</html>
