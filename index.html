<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Habib Topup - 2025</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
    }
    .container {
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(15px);
      -webkit-backdrop-filter: blur(15px);
      border-radius: 20px;
      border: 1px solid rgba(255, 255, 255, 0.2);
      padding: 40px 30px;
      width: 90%;
      max-width: 420px;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
      text-align: center;
    }
    .logo {
      font-size: 42px;
      font-weight: 700;
      background: linear-gradient(45deg, #00ff88, #00d0ff, #6600ff);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 10px;
      letter-spacing: 2px;
    }
    .tagline {
      font-size: 14px;
      opacity: 0.8;
      margin-bottom: 40px;
    }
    .btn {
      width: 100%;
      padding: 14px;
      margin: 12px 0;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
    }
    .btn-login {
      background: linear-gradient(45deg, #00ff88, #00d0ff);
      color: #000;
    }
    .btn-register {
      background: rgba(255, 255, 255, 0.15);
      color: white;
      border: 1px solid rgba(255, 255, 255, 0.3);
    }
    .btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 10px 25px rgba(0, 255, 255, 0.4);
    }
    .footer {
      margin-top: 40px;
      font-size: 12px;
      opacity: 0.6;
    }
    .glow {
      position: absolute;
      width: 300px;
      height: 300px;
      background: radial-gradient(circle, rgba(0, 255, 136, 0.3), transparent);
      border-radius: 50%;
      top: -100px;
      left: -100px;
      z-index: -1;
      animation: pulse 8s infinite;
    }
    @keyframes pulse {
      0% { transform: scale(1); }
      50% { transform: scale(1.3); }
      100% { transform: scale(1); }
    }
  </style>
</head>
<body>

  <div class="glow"></div>

  <div class="container">
    <h1 class="logo">Habib Topup</h1>
    <p class="tagline">Fast • Secure • 24/7 Diamond & UC Topup Service</p>

    <button class="btn btn-login">Login</button>
    <button class="btn btn-register">Register</button>

    <div class="footer">
      © 2025 Habib Topup • All Rights Reserved
    </div>
  </div>

</body>
</html>
