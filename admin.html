<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Habib YT — Admin Panel</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      font-family: "Poppins", sans-serif;
      background-color: #f6f9ff;
      color: #222;
      margin: 0;
      padding: 0;
    }
    header {
      background: linear-gradient(90deg, #0050ef, #0078ff);
      color: #fff;
      padding: 15px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    header img { height: 40px; border-radius: 50%; }
    header h1 { font-size: 20px; margin: 0; }
    header button {
      background: #fff;
      color: #0078ff;
      border: none;
      padding: 6px 12px;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
    }
    main {
      padding: 20px;
      max-width: 900px;
      margin: auto;
    }
    h2 {
      border-left: 4px solid #0078ff;
      padding-left: 10px;
      margin-top: 20px;
      color: #0078ff;
    }
    .card {
      background: #fff;
      border-radius: 12px;
      padding: 15px;
      margin-top: 15px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    .card p { margin: 6px 0; }
    .btn {
      padding: 6px 10px;
      margin: 4px 4px 0 0;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-weight: 600;
    }
    .btn-approve { background: #00b050; color: #fff; }
    .btn-reject { background: #f44336; color: #fff; }
    .footer {
      text-align: center;
      padding: 10px;
      margin-top: 30px;
      font-size: 13px;
      color: #555;
    }
    @media (max-width:600px){
      header h1{font-size:16px;}
      main{padding:10px;}
    }
  </style>
</head>
<body>

<header>
  <div style="display:flex;align-items:center;gap:10px;">
    <img src="assets/logo.png" alt="Habib YT">
    <h1>Habib YT — Admin Panel</h1>
  </div>
  <button onclick="logout()">Logout</button>
</header>

<main>
  <h2>💰 Pending Add Money Requests</h2>
  <div id="pendingMoney">Loading...</div>

  <h2>📦 Pending Orders</h2>
  <div id="pendingOrders">Loading...</div>
</main>

<div class="footer">© 2025 Habib YT — আপনার বিশ্বস্ত সহযোগী</div>

<script type="module" src="app.js"></script>
</body>
</html>
