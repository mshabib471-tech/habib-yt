<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Panel — Habib YT</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      font-family: "Poppins", sans-serif;
      background: #f5f7fb;
      margin: 0;
    }

    header {
      background: #007bff;
      color: white;
      text-align: center;
      padding: 15px;
      font-size: 22px;
      font-weight: bold;
      box-shadow: 0 2px 6px rgba(0,0,0,0.15);
    }

    .container {
      max-width: 800px;
      margin: 30px auto;
      background: white;
      border-radius: 12px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
      padding: 25px;
    }

    h2 {
      text-align: center;
      color: #007bff;
      margin-bottom: 25px;
    }

    .card {
      background: #f8faff;
      border: 1px solid #e1e5ff;
      border-radius: 10px;
      padding: 15px;
      margin-bottom: 15px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.05);
    }

    .card p { margin: 6px 0; color: #333; }

    .btn-group {
      display: flex;
      gap: 10px;
      margin-top: 8px;
    }

    button {
      flex: 1;
      border: none;
      padding: 10px;
      border-radius: 6px;
      font-weight: bold;
      cursor: pointer;
      transition: 0.2s;
    }

    .approve {
      background: #28a745;
      color: white;
    }
    .approve:hover { background: #218838; }

    .reject {
      background: #dc3545;
      color: white;
    }
    .reject:hover { background: #bb2d3b; }

    footer {
      text-align: center;
      color: #666;
      margin-top: 30px;
      font-size: 14px;
    }

    .notice {
      background: #fff3cd;
      border-left: 5px solid #ffca2c;
      padding: 12px;
      margin-bottom: 25px;
      border-radius: 6px;
      color: #856404;
    }
  </style>
</head>

<body>
  <header>🛠 Habib YT Admin Panel</header>

  <div class="container">
    <div class="notice">
      ⚠ শুধুমাত্র অনুমোদিত এডমিন (<b>mshabib471@gmail.com</b>) এই প্যানেল ব্যবহার করতে পারবেন।
    </div>

    <h2>💰 Pending Wallet Requests</h2>
    <div id="pendingMoney">Loading...</div>

    <h2>📦 Pending Orders</h2>
    <div id="pendingOrders">Loading...</div>
  </div>

  <footer>© 2025 Habib YT — Admin Dashboard</footer>

  <script type="module" src="firebase.js"></script>
  <script type="module" src="app.js"></script>
</body>
</html>
