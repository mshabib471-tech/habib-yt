<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>অ্যাডমিন - Habib YT</title>
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
  <div class="container">
    <h2>অ্যাডমিন প্যানেল</h2>
    <input type="password" id="pass" placeholder="পাসওয়ার্ড">
    <button onclick="checkAdmin()">লগইন</button>
    <div id="admin-panel" style="display:none;">
      <h3>সব অর্ডার</h3>
      <div id="admin-orders"></div>
    </div>
  </div>
  <script>
    function checkAdmin() {
      if (document.getElementById('pass').value === 'habib1577') {
        document.getElementById('admin-panel').style.display = 'block';
        const orders = JSON.parse(localStorage.getItem('orders')) || [];
        const list = document.getElementById('admin-orders');
        orders.forEach(o => {
          list.innerHTML += <div><b>${o.name}</b> - ${o.price}৳ - ${o.status}</div>;
        });
      } else alert('ভুল পাসওয়ার্ড');
    }
  </script>
</body>
</html>
