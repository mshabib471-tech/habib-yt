<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Admin Panel</title>

<style>
body {
  background: #eef3ff;
  font-family: Poppins, sans-serif;
  margin: 0;
}

header {
  background: #062e63;
  padding: 15px;
  color: white;
  text-align: center;
  font-size: 24px;
  font-weight: 600;
}

.section {
  background: white;
  margin: 15px;
  padding: 15px;
  border-radius: 12px;
  box-shadow: 0 3px 10px rgba(0,0,0,0.1);
}

.order-box {
  margin-top: 10px;
  padding: 12px;
  background: #f6f6ff;
  border-radius: 10px;
  border-left: 4px solid #0a7cff;
}

.btn {
  border: none;
  padding: 8px 14px;
  font-size: 15px;
  border-radius: 8px;
  cursor: pointer;
  margin-right: 6px;
  margin-top: 6px;
}

.approve { background:#0bbf4f; color:white; }
.cancel { background:#ff3b3b; color:white; }
</style>
</head>

<body>

<header>Admin Control</header>

<div class="section">
  <h2>📦 Pending Orders</h2>
  <div id="pending">Loading...</div>
</div>

<div class="section">
  <h2>💰 Wallet Requests</h2>
  <div id="walletReq">Loading...</div>
</div>

<script type="module">
import { auth, db } from "./firebase.js";
import { 
  onAuthStateChanged 
} from "https://www.gstatic.com/firebasejs/12.5.0/firebase-auth.js";

import {
  collection,
  query,
  where,
  getDocs,
  updateDoc,
  doc,
  getDoc
} from "https://www.gstatic.com/firebasejs/12.5.0/firebase-firestore.js";


// ---------- CHECK ADMIN ----------
onAuthStateChanged(auth, async (user) => {
  if (!user) {
    location.href = "login.html";
    return;
  }

  // ONLY YOU will be admin – replace with your own email
  if (user.email !== "mshabib471@gmail.com") {
    alert("Admins only!");
    location.href = "index.html";
    return;
  }

  loadPendingOrders();
  loadWalletRequests();
});


// ---------- LOAD PENDING ORDERS ----------
async function loadPendingOrders() {
  const box = document.getElementById("pending");
  box.innerHTML = "Loading...";

  const q = query(collection(db, "orders"), where("status", "==", "pending"));
  const snap = await getDocs(q);

  if (snap.empty) {
    box.innerHTML = "No pending orders.";
    return;
  }

  box.innerHTML = "";
  snap.forEach(order => {
    let d = order.data();

    box.innerHTML += `
      <div class="order-box">
        <b>Product:</b> ${d.product}<br>
        <b>UID:</b> ${d.uid}<br>
        <b>Price:</b> ${d.price} TK<br>
        <b>User:</b> ${d.user}<br><br>

        <button class="btn approve" onclick="approveOrder('${order.id}','${d.user}',${d.price})">Approve</button>
        <button class="btn cancel" onclick="cancelOrder('${order.id}','${d.user}',${d.price})">Cancel</button>
      </div>
    `;
  });
}


// ---------- APPROVE ORDER ----------
window.approveOrder = async function(orderId, userUID, price) {
  await updateDoc(doc(db, "orders", orderId), {
    status: "complete",
    completedAt: new Date()
  });

  alert("Order Approved!");
  location.reload();
};


// ---------- CANCEL ORDER (REFUND) ----------
window.cancelOrder = async function(orderId, userUID, price) {
  const walletRef = doc(db, "wallets", userUID);
  const walletSnap = await getDoc(walletRef);

  let oldBal = walletSnap.exists() ? walletSnap.data().balance : 0;

  // Refund
  await updateDoc(walletRef, {
    balance: oldBal + price
  });

  // Update order status
  await updateDoc(doc(db, "orders", orderId), {
    status: "cancelled",
    cancelledAt: new Date()
  });

  alert("Order Cancelled + Refund Done!");
  location.reload();
};


// ---------- LOAD WALLET REQUESTS ----------
async function loadWalletRequests() {
  const box = document.getElementById("walletReq");
  
  const q = query(collection(db, "paymentReq"), where("status", "==", "pending"));
  const snap = await getDocs(q);

  if (snap.empty) {
    box.innerHTML = "No wallet requests.";
    return;
  }

  box.innerHTML = "";
  snap.forEach(req => {
    let d = req.data();

    box.innerHTML += `
      <div class="order-box">
        <b>User:</b> ${d.user}<br>
        <b>Method:</b> ${d.method}<br>
        <b>Amount:</b> ${d.amount} TK<br>
        <b>TrxID:</b> ${d.trxid}<br><br>

        <button class="btn approve" onclick="approveWallet('${req.id}','${d.user}',${d.amount})">Approve</button>
        <button class="btn cancel" onclick="cancelWallet('${req.id}')">Reject</button>
      </div>
    `;
  });
}


// ---------- APPROVE WALLET ----------
window.approveWallet = async function(reqId, userUID, amount) {

  const walletRef = doc(db, "wallets", userUID);
  const walletSnap = await getDoc(walletRef);

  let oldBal = walletSnap.exists() ? walletSnap.data().balance : 0;

  await updateDoc(walletRef, {
    balance: oldBal + amount
  });

  await updateDoc(doc(db, "paymentReq", reqId), {
    status: "approved"
  });

  alert("Wallet Added!");
  location.reload();
};


// ---------- REJECT WALLET ----------
window.cancelWallet = async function(reqId) {
  await updateDoc(doc(db, "paymentReq", reqId), {
    status: "cancelled"
  });

  alert("Request Rejected!");
  location.reload();
};

</script>

</body>
</html>
