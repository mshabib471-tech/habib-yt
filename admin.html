<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Habib YT — Admin Panel</title>

<style>
body {
  font-family: "Poppins", sans-serif;
  margin: 0;
  background: #f4f7fb;
}
header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  background: #007bff;
  padding: 12px 18px;
  color: white;
  font-size: 22px;
  font-weight: bold;
}
.logout {
  background: white;
  color: #007bff;
  border: none;
  padding: 6px 12px;
  border-radius: 8px;
  cursor: pointer;
  font-weight: bold;
}
.tabs {
  display: flex;
  justify-content: center;
  gap: 10px;
  margin: 12px 0;
}
.tabs button {
  padding: 10px;
  border: none;
  border-radius: 8px;
  font-weight: bold;
  cursor: pointer;
}
.active { background: #007bff; color: white; }
.card {
  background: white;
  padding: 12px;
  margin: 12px;
  border-radius: 10px;
  box-shadow: 0 2px 6px rgba(0,0,0,0.1);
}
.btn-green {
  background: #28a745;
  color: white;
  border: none;
  padding: 6px 12px;
  border-radius: 6px;
  cursor: pointer;
}
.btn-red {
  background: #dc3545;
  color: white;
  border: none;
  padding: 6px 12px;
  border-radius: 6px;
  cursor: pointer;
}
footer {
  text-align: center;
  background: #007bff;
  color: white;
  padding: 12px;
  position: fixed;
  bottom: 0;
  width: 100%;
}
</style>
</head>

<body>

<header>
  👑 Habib YT — Admin Panel
  <button class="logout" onclick="logout()">Logout</button>
</header>

<div class="tabs">
  <button class="active" id="tabWallet">💰 Wallet Requests</button>
  <button id="tabOrders">🛒 Orders</button>
</div>

<div id="walletArea"></div>
<div id="ordersArea" style="display:none;"></div>

<footer>© 2025 Habib YT — Admin Dashboard</footer>

<script type="module" src="firebase.js"></script>
<script type="module" src="admin.js"></script>

</body>
</html>
