<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mobile Accessories | Habib YT</title>
  <style>
    body { font-family:"Poppins",sans-serif; margin:0; background:#f4f7fb; color:#333; }
    header {
      display:flex; align-items:center; justify-content:space-between;
      background:#007bff; color:white; padding:12px 18px; box-shadow:0 2px 8px rgba(0,0,0,0.1);
    }
    header img { height:42px; width:42px; border-radius:50%; }
    nav button {
      background:white; color:#007bff; border:none; border-radius:8px;
      padding:8px 12px; cursor:pointer; font-weight:600;
    }
    nav button:hover { background:#0056d4; color:white; }
    .title { text-align:center; padding:20px; color:#007bff; }
    .products {
      display:grid; grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
      gap:15px; margin:20px;
    }
    .card {
      background:white; border-radius:12px; padding:10px;
      box-shadow:0 2px 8px rgba(0,0,0,0.1); text-align:center;
    }
    .card img { width:100%; border-radius:8px; height:120px; object-fit:cover; }
    .card h3 { color:#007bff; }
    .card button {
      background:#007bff; color:white; border:none; padding:8px 12px; border-radius:8px;
      cursor:pointer; margin-top:8px;
    }
    footer {
      background:#007bff; color:white; text-align:center; padding:12px; margin-top:30px;
      box-shadow:0 -2px 8px rgba(0,0,0,0.15);
    }
    .bottom-nav {
      position:fixed; bottom:0; left:0; width:100%; background:white;
      border-top:1px solid #ccc; display:flex; justify-content:space-around; padding:10px 0;
    }
    .bottom-nav button {
      background:none; border:none; color:#007bff; font-weight:bold; cursor:pointer;
    }
  </style>
</head>
<body>

  <header>
    <img src="assets/logo.png" alt="Habib YT Logo">
    <h2>Habib YT</h2>
    <nav>
      <button onclick="window.location.href='index.html'">Home</button>
    </nav>
  </header>

  <h2 class="title">🛍️ মোবাইল এক্সেসরিজ</h2>

  <section class="products">
    <div class="card">
      <img src="assets/accessories.jpg" alt="Earphones">
      <h3>Wireless Earphones</h3>
      <p>৳ 850</p>
      <button>Order Now</button>
    </div>
    <div class="card">
      <img src="assets/accessories.jpg" alt="Powerbank">
      <h3>Power Bank 10000mAh</h3>
      <p>৳ 1200</p>
      <button>Order Now</button>
    </div>
    <div class="card">
      <img src="assets/accessories.jpg" alt="Charger">
      <h3>Fast Charger 33W</h3>
      <p>৳ 750</p>
      <button>Order Now</button>
    </div>
  </section>

  <footer>
    Habib YT — আপনার বিশ্বস্ত সহযোগী
    <br><small>© 2025 Habib YT</small>
  </footer>

  <div class="bottom-nav">
    <button onclick="window.location.href='index.html'">🏠 Home</button>
    <button onclick="window.location.href='dashboard.html'">💼 Dashboard</button>
    <button onclick="window.location.href='login.html'">🔐 Login</button>
    <button onclick="window.location.href='add-money.html'">💰 Add Money</button>
  </div>
</body>
</html>
