<!-- payment-nagad.html -->
<!DOCTYPE html>
<html lang="bn">
<head><meta charset="utf-8" /><meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Nagad Payment | Habib YT</title>
<link rel="stylesheet" href="style.css" />
</head>
<body>
<header class="topbar container"><div class="logo-wrap"><img src="assets/logo.png" alt=""><div><div class="site-title">Habib YT</div></div></div><div><button onclick="go('add-money.html')" class="login-btn">Back</button></div></header>

<div class="container">
  <div class="card-small center">
    <h3>Nagad Payment</h3>
    <p class="small">Send money to: <b>01868461577</b></p>
    <p class="small">Amount: <strong id="showAmount">0</strong>৳</p>

    <input id="trxId" placeholder="Transaction ID (যেমন: 12345ABC)" />
    <button id="submitBtn" class="btn">Submit for Verification</button>
    <p class="small" style="margin-top:8px;">After submission admin will verify the transaction. Do not try fake IDs.</p>
  </div>
</div>

<script type="module">
  import { auth, db } from './app.js';
  import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.5.0/firebase-auth.js";
  import { collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/12.5.0/firebase-firestore.js";

  const params = new URLSearchParams(location.search);
  const amount = parseFloat(params.get('amount')) || 0;
  document.getElementById('showAmount').textContent = amount;

  document.getElementById('submitBtn').addEventListener('click', () => {
    const trx = document.getElementById('trxId').value.trim();
    if (!trx) return alert('Transaction ID লিখুন');

    onAuthStateChanged(auth, async (user) => {
      if (!user) return alert('আগে Login করুন');
      // create pending transaction
      await addDoc(collection(db, 'transactions'), {
        userEmail: user.email,
        method: 'Nagad',
        amount: amount,
        trxId: trx,
        status: 'pending',
        createdAt: serverTimestamp()
      });
      alert('✅ Payment submitted for admin verification');
      window.location.href = 'dashboard.html';
    });
  });
</script>
</body>
</html>
