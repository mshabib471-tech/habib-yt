<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Add Money</title>

<style>
  body {
    margin: 0;
    font-family: Poppins, sans-serif;
    background: #f4f6ff;
  }

  header {
    background: #0A7CFF;
    padding: 15px;
    text-align: center;
    color: white;
    font-size: 22px;
    font-weight: 600;
  }

  .box {
    background: white;
    margin: 15px;
    padding: 20px;
    border-radius: 12px;
    box-shadow: 0 3px 8px rgba(0,0,0,0.1);
  }

  input {
    width: 100%;
    padding: 12px;
    border: 1px solid #ddd;
    border-radius: 10px;
    font-size: 17px;
    margin-top: 8px;
  }

  .btn {
    width: 100%;
    padding: 12px;
    background: #6a00ff;
    color: white;
    border: none;
    border-radius: 10px;
    margin-top: 15px;
    font-size: 18px;
    cursor: pointer;
  }

  .red { color: red; font-size: 15px; margin-top: 10px; }

  #step2 { display: none; }
</style>
</head>

<body>

<header>Add Money</header>

<!-- STEP - 1 -->
<div id="step1" class="box">
  <h2>Enter Amount</h2>

  <input type="number" id="amount" placeholder="Enter amount">
  <p id="error" class="red"></p>

  <button class="btn" onclick="showStep2()">Click Here To Add Money</button>
</div>

<!-- STEP - 2 -->
<div id="step2" class="box">
  <center>
    <img src="https://seeklogo.com/images/B/bkash-logo-250x250.png" width="100">
  </center>

  <h3>Wallet</h3>

  <input type="text" id="showAmount" disabled>

  <h3>ট্রানজেকশন আইডি দিন</h3>
  <input type="text" id="trxid" placeholder="Enter Transaction ID">

  <p style="padding:10px;background:#ffe5f2;border-radius:10px;">
    ● *247# ডায়াল করুন বা bKash অ্যাপে যান <br><br>
    ● "Send Money"-এ ক্লিক করুন <br><br>
    ● প্রাপক নম্বর লিখুন:<br>
    <b style="font-size:22px;color:#e8006f;">01322290367</b><br><br>
    ● টাকার পরিমান দিন: <b id="amtText"></b> টাকা<br><br>
    ● Send Money সম্পন্ন হলে আপনার SMS-এ Transaction ID পাবেন<br><br>
    ● নিচে Transaction ID লিখে VERIFY চাপুন
  </p>

  <button class="btn" onclick="sendRequest()">VERIFY</button>
</div>


<script type="module">
import { auth, db } from "./firebase.js";
import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.5.0/firebase-auth.js";
import { addDoc, collection } from "https://www.gstatic.com/firebasejs/12.5.0/firebase-firestore.js";

let userUID = null;

// CHECK LOGIN
onAuthStateChanged(auth, (user) => {
  if (!user) return location.href = "login.html";
  userUID = user.uid;
});

// STEP 1 → STEP 2
window.showStep2 = function () {
  let amount = document.getElementById("amount").value;

  if (!amount || amount < 5) {
    document.getElementById("error").innerText = "Minimum amount 5 TK";
    return;
  }

  document.getElementById("error").innerText = "";
  document.getElementById("step1").style.display = "none";
  document.getElementById("step2").style.display = "block";

  document.getElementById("showAmount").value = amount + " TK";
  document.getElementById("amtText").innerText = amount;
};


// SEND REQUEST TO FIREBASE → walletRequests
window.sendRequest = async function () {
  let trx = document.getElementById("trxid").value.trim();
  let amount = document.getElementById("amount").value;

  if (!trx) {
    alert("Enter Transaction ID!");
    return;
  }

  await addDoc(collection(db, "walletRequests"), {
    user: userUID,
    amount: Number(amount),
    trxid: trx,
    method: "bkash",
    status: "pending",
    time: new Date()
  });

  alert("Request Sent! Admin will approve soon.");
  location.href = "dashboard.html";
};
</script>

</body>
</html>
