<!DOCTYPE html><html lang="bn">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Add Money — Habib Topup</title>
<style>
 body{background:#0d0b2b;font-family:Poppins,sans-serif;color:#fff;margin:0;padding-bottom:90px}
 .container{max-width:480px;margin:auto;padding:15px}
 header{background:#6a0dad;padding:15px;text-align:center;color:#fff;font-size:22px;font-weight:700;position:sticky;top:0;z-index:99}
 .box{background:rgba(255,255,255,0.08);padding:20px;border-radius:14px;margin-top:20px;border:1px solid rgba(0,255,136,0.3)}
 input{width:100%;padding:14px;border:none;border-radius:10px;margin-top:10px;background:#1a1a3d;color:#fff;font-size:16px}
 button{width:100%;padding:14px;background:#00ff88;color:#000;border:none;border-radius:10px;font-size:18px;font-weight:700;margin-top:12px;cursor:pointer}
 .method{display:flex;gap:15px;margin-top:15px}
 .m{flex:1;background:#1a1a3d;border-radius:12px;padding:15px;text-align:center;border:2px solid transparent;cursor:pointer}
 .m.active{border-color:#00ff88}
 .nav{position:fixed;bottom:0;left:0;right:0;background:#000;border-top:3px solid #00ff88;display:flex;justify-content:space-around;padding:12px 0}
 .nav a{text-align:center;color:#fff;text-decoration:none;font-size:13px}
 .nav i{font-size:22px;color:#00ff88;margin-bottom:4px}
</style>
</head>
<body>
<header>Add Money</header>
<div class="container">
 <div class="box">
  <h3>💳 Payment Method</h3>
  <div class="method" id="payBox">
    <div class="m active" onclick="selectMethod(this,'bkash')">Bkash</div>
    <div class="m" onclick="selectMethod(this,'nagad')">Nagad</div>
  </div>
  <h3 style="margin-top:15px">📌 Amount</h3>
  <input type="number" id="amount" placeholder="Amount লিখুন (যেমন: 200)">
  <h3 style="margin-top:15px">📌 TrxID</h3>
  <input type="text" id="trxid" placeholder="লেনদেন নম্বর (TrxID)">
  <button onclick="sendRequest()">Submit Request</button>
 </div>
</div>
<div class="nav">
 <a href="index.html"><i class="fas fa-home"></i>হোম</a>
 <a href="add-money.html" class="active"><i class="fas fa-gem"></i>টপআপ</a>
 <a href="login.html"><i class="fas fa-user"></i>অ্যাকাউন্ট</a>
 <a href="support.html"><i class="fas fa-headset"></i>সাপোর্ট</a>
</div>
<script type="module">
 import {auth,db} from './firebase.js'
 import {onAuthStateChanged} from 'https://www.gstatic.com/firebasejs/12.5.0/firebase-auth.js'
 import {collection,addDoc,serverTimestamp} from 'https://www.gstatic.com/firebasejs/12.5.0/firebase-firestore.js'
 let payMethod='bkash'
 window.selectMethod=function(el,m){document.querySelectorAll('.m').forEach(x=>x.classList.remove('active'));el.classList.add('active');payMethod=m}
 onAuthStateChanged(auth,(user)=>{if(!user){alert('Please login first');location.href='login.html'}})
 window.sendRequest=async function(){let amount=document.getElementById('amount').value.trim();let trx=document.getElementById('trxid').value.trim();if(amount==''||trx==''){alert('সব তথ্য পূরণ করুন');return;}let u=auth.currentUser;if(!u){alert('Please login');return;}await addDoc(collection(db,'walletRequests'),{user:u.uid,amount:Number(amount),trxid:trx,method:payMethod,status:'pending',time:serverTimestamp()});alert('Request Sent!');location.href='dashboard.html'}
</script>
<!-- Bottom Navigation -->
<div class="nav">
 <a href="index.html"><i class="fas fa-home"></i> হোম</a>
 <a href="add-money.html" class="active"><i class="fas fa-gem"></i> টপআপ</a>
 <a href="login.html"><i class="fas fa-user"></i> অ্যাকাউন্ট</a>
 <a href="support.html"><i class="fas fa-headset"></i> সাপোর্ট</a>
</div></body>
</html>
