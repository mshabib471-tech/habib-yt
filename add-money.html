<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Add Money — Habib YT</title>

  <style>
    body {
      font-family: "Poppins", sans-serif;
      background: #f5f7fb;
      margin: 0;
      padding: 0;
    }
    header {
      background: #007bff;
      color: white;
      padding: 15px 20px;
      font-size: 20px;
      font-weight: bold;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    header a {
      background: white;
      color: #007bff;
      padding: 6px 12px;
      border-radius: 6px;
      text-decoration: none;
      font-weight: bold;
    }
    .container {
      width: 90%;
      max-width: 430px;
      background: white;
      margin: 30px auto;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    label { font-weight: bold; margin-top: 10px; display: block; }
    input {
      width: 100%;
      padding: 10px;
      border: 1px solid #ccc;
      border-radius: 8px;
      margin-top: 5px;
      font-size: 15px;
    }
    button {
      width: 100%;
      background: #007bff;
      color: white;
      border: none;
      padding: 12px;
      border-radius: 8px;
      margin-top: 20px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
    }
    .steps {
      background: #eef5ff;
      border-left: 4px solid #007bff;
      padding: 12px;
      border-radius: 8px;
      margin-top: 15px;
      line-height: 1.8;
    }
    footer {
      text-align: center;
      padding: 20px;
      color: #777;
    }
  </style>
</head>

<body>

<header>
  <span>💰 Add Money</span>
  <a href="dashboard.html">Back</a>
</header>

<div class="container">
  <h2 style="text-align:center;color:#007bff;">ওয়ালেটে টাকা যোগ করুন</h2>

  <label>Amount (BDT)</label>
  <input id="amount" type="number" placeholder="যেমনঃ 100">

  <label>Payment Method</label>
  <input type="text" value="bKash" disabled>

  <label>Send Money করুন এই নম্বরে:</label>
  <input type="text" value="01868461577" readonly style="color:#c82333;font-weight:bold;">

  <div class="steps">
    🧾 <b>নির্দেশনা:</b><br>
    1️⃣ বিকাশ অ্যাপে যান বা *247# ডায়াল করুন।<br>
    2️⃣ “Send Money” সিলেক্ট করুন।<br>
    3️⃣ উপরের নম্বরে টাকা পাঠান।<br>
    4️⃣ TrxID নিচে লিখুন।<br>
    5️⃣ Submit চাপুন।
  </div>

  <label>Transaction ID</label>
  <input id="trxid" type="text" placeholder="আপনার TrxID দিন">

  <button onclick="submitAddMoney()">Submit</button>
</div>

<footer>© 2025 Habib YT — আপনার বিশ্বস্ত সহযোগী</footer>

<script type="module" src="firebase.js"></script>
<script type="module" src="app.js"></script>

</body>
</html>
