<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Add Money | Habib YT</title>

<style>
  body {
    font-family: Poppins, sans-serif;
    background: #eef3ff;
    margin: 0;
    padding: 0;
  }

  header {
    background: #0a7cff;
    padding: 15px;
    text-align: center;
    color: white;
    font-size: 22px;
    font-weight: 600;
  }

  .box {
    background: white;
    margin: 15px;
    padding: 20px;
    border-radius: 12px;
    box-shadow: 0 3px 10px rgba(0,0,0,0.1);
  }

  input {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    border-radius: 10px;
    border: 1px solid #bbb;
    font-size: 16px;
  }

  .btn {
    width: 100%;
    padding: 14px;
    margin-top: 15px;
    background: #0a7cff;
    color: white;
    border: none;
    border-radius: 10px;
    font-size: 18px;
    cursor: pointer;
    font-weight: 600;
  }

  .note {
    background: #fff4d6;
    padding: 10px;
    margin-top: 10px;
    border-radius: 8px;
    color: #8a6500;
    font-size: 14px;
  }
</style>
</head>

<body>

<header>Add Money</header>

<div class="box">
  <h2>📲 Send Money via bKash</h2>
  <p style="font-size:16px;">
    নিচের bKash নম্বরে টাকা Send Money করুন:
  </p>

  <div style="font-size:22px; font-weight:700; color:#d10000; margin-bottom:10px;">
    01868461577
  </div>

  <div class="note">
    ✔ অবশ্যই "Send Money"<br>
    ✔ Cash Out করবেন না<br>
    ✔ টাকা পাঠানোর পরে নিচে TRX ID দিন
  </div>

  <input type="number" id="amount" placeholder="Amount (TK)" />
  <input type="text" id="trxid" placeholder="bKash Transaction ID" />

  <button class="btn" onclick="submitRequest()">Submit Request</button>
</div>

<script type="module">
import { auth, db } from "./firebase.js";
import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.5.0/firebase-auth.js";
import { addDoc, collection } from "https://www.gstatic.com/firebasejs/12.5.0/firebase-firestore.js";

let userUID = null;

onAuthStateChanged(auth, (user) => {
  if (!user) {
    location.href = "login.html";
    return;
  }
  userUID = user.uid;
});

/* ---------------------------
     SEND REQUEST FUNCTION
-----------------------------*/
window.submitRequest = async function () {
  let amount = document.getElementById("amount").value;
  let trx = document.getElementById("trxid").value;

  if (!amount || amount < 20) {
    alert("কমপক্ষে ২০ টাকা দিতে হবে!");
    return;
  }

  if (!trx || trx.length < 6) {
    alert("সঠিক Transaction ID দিন!");
    return;
  }

  await addDoc(collection(db, "paymentRequests"), {
    user: userUID,
    amount: Number(amount),
    trxid: trx,
    status: "pending",
    created: new Date()
  });

  alert("✔ Request submitted! Admin approval এর জন্য অপেক্ষা করুন");
  location.href = "dashboard.html";
};
</script>

</body>
</html>
