<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>একাউন্ট তৈরি করুন | Habib YT</title>
  <style>
    body {
      font-family: "Poppins", sans-serif;
      background: #f4f7fb;
      color: #222;
      text-align: center;
      margin: 0;
    }
    header {
      background: #007bff;
      color: white;
      padding: 15px;
      font-size: 22px;
      font-weight: 600;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }
    form {
      background: white;
      width: 90%;
      max-width: 400px;
      margin: 30px auto;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    }
    input {
      width: 100%;
      padding: 10px;
      margin: 8px 0;
      border: 1px solid #ccc;
      border-radius: 8px;
      font-size: 16px;
    }
    button {
      background: #007bff;
      color: white;
      border: none;
      padding: 12px;
      border-radius: 8px;
      font-size: 16px;
      cursor: pointer;
      width: 100%;
      font-weight: 600;
      transition: 0.2s;
    }
    button:hover { background: #0056d4; }
    .home-btn {
      background: #28a745;
      margin-top: 10px;
    }
    p a {
      color: #007bff;
      text-decoration: none;
      font-weight: 500;
    }
    footer {
      text-align: center;
      color: #555;
      margin-top: 20px;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <header>📝 একাউন্ট তৈরি করুন</header>

  <form onsubmit="event.preventDefault(); registerUser();">
    <h3>Habib YT — আপনার বিশ্বস্ত সহযোগী</h3>
    <input type="email" id="signupEmail" placeholder="Email" required />
    <input type="password" id="signupPassword" placeholder="Password" required />
    <button type="submit">Create Account</button>
    <p>ইতিমধ্যে একাউন্ট আছে? <a href="login.html">Login</a></p>
    <button type="button" class="home-btn" onclick="window.location.href='index.html'">🏠 Go to Home</button>
  </form>

  <footer>© 2025 Habib YT</footer>

  <script type="module" src="firebase.js"></script>
  <script type="module">
    import { auth } from "./firebase.js";
    import { createUserWithEmailAndPassword, onAuthStateChanged } 
    from "https://www.gstatic.com/firebasejs/12.5.0/firebase-auth.js";

    // ✅ Already logged in = redirect
    onAuthStateChanged(auth, (user) => {
      if (user) window.location.href = "dashboard.html";
    });

    // ✅ Register new user
    window.registerUser = async function () {
      const email = document.getElementById("signupEmail").value;
      const pass = document.getElementById("signupPassword").value;
      try {
        await createUserWithEmailAndPassword(auth, email, pass);
        alert("✅ একাউন্ট তৈরি হয়েছে!");
        window.location.href = "dashboard.html";
      } catch (err) {
        alert("❌ ত্রুটি: " + err.message);
      }
    };
  </script>
</body>
</html>
