<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>একাউন্ট তৈরি করুন | Habib YT</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(to bottom right, #007bff, #ffffff);
      margin: 0; padding: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      height: 100vh;
    }
    .signup-box {
      background: #fff;
      padding: 30px;
      border-radius: 15px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
      width: 90%; max-width: 380px;
      text-align: center;
    }
    .signup-box img {
      width: 60px; margin-bottom: 10px;
    }
    h2 { color: #007bff; margin-bottom: 10px; }
    input {
      width: 100%;
      padding: 10px; margin: 8px 0;
      border: 1px solid #ccc;
      border-radius: 8px;
    }
    button {
      background: #007bff;
      color: white; border: none;
      width: 100%; padding: 10px;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
    }
    button:hover { background: #0056d4; }
    .google-btn {
      background: #db4437; margin-top: 10px;
    }
    .google-btn:hover { background: #c23321; }
    a {
      color: #007bff; text-decoration: none; font-weight: bold;
    }
    footer {
      position: fixed; bottom: 10px;
      text-align: center; font-size: 14px;
      color: #555;
    }
    .back-btn {
      position: absolute; top: 20px; left: 20px;
      background: #007bff; color: white;
      border: none; padding: 8px 14px;
      border-radius: 8px; cursor: pointer;
    }
  </style>
</head>
<body>
  <button class="back-btn" onclick="window.location.href='login.html'">← Back</button>
  <div class="signup-box">
    <img src="assets/logo.png" alt="Habib YT">
    <h2>📝 একাউন্ট তৈরি করুন</h2>

    <input type="email" id="signupEmail" placeholder="Email" required>
    <input type="password" id="signupPassword" placeholder="Password" required>

    <button onclick="registerUser()">Create Account</button>
    <button class="google-btn" onclick="googleLogin()">🔸 Google Sign Up</button>

    <p>ইতিমধ্যেই একাউন্ট আছে? <a href="login.html">Login</a></p>
  </div>

  <footer>© 2025 Habib YT — আপনার বিশ্বস্ত সহযোগী</footer>
  <script type="module" src="app.js"></script>
</body>
</html>
