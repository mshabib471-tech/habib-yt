<!DOCTYPE html>
<html lang="bn" translate="no">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Free Fire Diamond | Habib YT</title>

  <style>
    body {
      font-family: "Poppins", sans-serif;
      margin: 0;
      background: #f2f6ff;
      padding-bottom: 80px;
    }

    /* HEADER */
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 15px 20px;
      background: linear-gradient(90deg, #0052d4, #4364f7, #6fb1fc);
      color: white;
      border-bottom-left-radius: 20px;
      border-bottom-right-radius: 20px;
      box-shadow: 0 5px 18px rgba(0,0,0,0.25);
    }
    header img {
      width: 45px;
      height: 45px;
      border-radius: 50%;
    }
    header h2 {
      font-size: 20px;
      font-weight: 600;
      margin-left: 10px;
    }
    .home-btn {
      background:white;
      color:#0052d4;
      padding:8px 14px;
      border-radius:10px;
      border:none;
      font-weight:600;
      cursor:pointer;
    }

    /* TITLE */
    h2 {
      text-align:center;
      margin:18px 0;
      color:#0052d4;
      font-size:24px;
      font-weight:700;
    }

    /* PACKAGE SMALL CARDS */
    .pkg-card {
      background:white;
      margin:10px 15px;
      padding:12px 16px;
      border-radius:14px;
      box-shadow:0 3px 10px rgba(0,0,0,0.08);
      display:flex;
      justify-content:space-between;
      align-items:center;
      cursor:pointer;
      transition:.25s;
    }
    .pkg-card:hover {
      transform:translateY(-3px);
      box-shadow:0 6px 14px rgba(0,0,0,0.15);
    }
    .pkg-name {
      font-size:15px;
      font-weight:600;
      color:#333;
    }
    .pkg-price {
      font-size:16px;
      font-weight:700;
      color:#0066ff;
    }
    .selected {
      background:#e8f1ff;
      border-left:4px solid #0052d4;
    }

    /* UID INPUT */
    .input-box {
      background:white;
      width:90%;
      margin:18px auto;
      padding:15px;
      text-align:center;
      border-radius:14px;
      box-shadow:0 3px 10px rgba(0,0,0,0.08);
    }
    input {
      width:100%;
      padding:10px;
      margin-top:10px;
      border:1px solid #ccc;
      border-radius:8px;
      font-size:16px;
    }
    .order-btn {
      width:100%;
      padding:12px;
      margin-top:12px;
      background:#0057e7;
      border:none;
      border-radius:10px;
      color:white;
      font-weight:700;
      cursor:pointer;
    }

    /* SUCCESS POPUP */
    #popupSuccess {
      position:fixed;
      top:0; left:0;
      width:100%; height:100%;
      background:rgba(0,0,0,0.55);
      display:none;
      justify-content:center;
      align-items:center;
      z-index:9999;
    }
    #popupSuccess .box {
      background:white;
      width:80%;
      max-width:360px;
      padding:25px;
      text-align:center;
      border-radius:18px;
      box-shadow:0 8px 25px rgba(0,0,0,0.25);
      animation:pop .4s ease;
    }
    @keyframes pop {
      from {transform:scale(.7); opacity:0;}
      to   {transform:scale(1); opacity:1;}
    }

    /* BOTTOM NAV */
    .bottom-nav {
      position:fixed;
      bottom:0;
      width:100%;
      background:white;
      padding:10px 0;
      display:flex;
      justify-content:space-around;
      border-top:1px solid #ccc;
      box-shadow:0 -4px 10px rgba(0,0,0,0.08);
    }
    .bottom-nav button {
      background:none;
      border:none;
      color:#0052d4;
      font-size:15px;
      font-weight:700;
      cursor:pointer;
    }

  </style>
</head>

<body>

<!-- HEADER -->
<header>
  <div style="display:flex;align-items:center;">
    <img src="assets/logo.png">
    <h2>Habib YT</h2>
  </div>

  <button class="home-btn" onclick="location.href='index.html'">Home</button>
</header>

<h2>🔥 Free Fire Diamond টপ-আপ</h2>

<!-- PACKAGES -->
<div id="pkgList"></div>

<!-- UID INPUT -->
<div class="input-box">
  <h3>🎮 আপনার Free Fire UID দিন</h3>
  <input id="uidInput" placeholder="আপনার UID লিখুন">
  <button class="order-btn" onclick="placeFFOrder()">Order Now</button>
</div>

<!-- SUCCESS POPUP -->
<div id="popupSuccess">
  <div class="box">
    <h3 style="color:#00c851;">✔ অর্ডার সম্পন্ন!</h3>
    <p id="popupMsg"></p>
    <button onclick="location.href='index.html'">Go to Home</button>
  </div>
</div>

<!-- FOOTER -->
<footer style="background:#0052d4;color:white;text-align:center;padding:12px;margin-top:25px;">
  © 2025 Habib YT — আপনার বিশ্বস্ত সহযোগী
</footer>

<!-- BOTTOM NAV -->
<div class="bottom-nav">
  <button onclick="location.href='index.html'">🏠 Home</button>
  <button onclick="location.href='dashboard.html'">💼 Dashboard</button>
  <button onclick="location.href='add-money.html'">💰 Add Money</button>
  <button onclick="location.href='login.html'">🔐 Login</button>
</div>

<!-- JS + FIREBASE -->
<script type="module">
  import { auth, db } from "./firebase.js";
  import { addDoc, collection } from "https://www.gstatic.com/firebasejs/12.5.0/firebase-firestore.js";

  const packages = [
    { name:"25 Diamond", price:23 },
    { name:"50 Diamond", price:38 },
    { name:"100 Diamond", price:74 },
    { name:"240 Diamond", price:156 },
    { name:"355 Diamond", price:235 },
    { name:"480 Diamond", price:315 },
    { name:"610 Diamond", price:395 },
    { name:"850 Diamond", price:550 },
    { name:"1240 Diamond", price:790 },
    { name:"1850 Diamond", price:1175 },
    { name:"3140 Diamond", price:1970 },
    { name:"Weekly Pass", price:155 },
    { name:"Monthly Pass", price:768 },
    { name:"1 Weekly + 1 Monthly", price:921 },
    { name:"2 Weekly + 1 Monthly", price:1080 },
    { name:"3 Weekly + 1 Monthly", price:1230 },
    { name:"4 Weekly + 1 Monthly", price:1385 },
  ];

  const pkgList = document.getElementById("pkgList");
  let selected = null;

  packages.forEach((p,i)=>{
    const div = document.createElement("div");
    div.className="pkg-card";
    div.innerHTML = `
      <span class="pkg-name">${p.name}</span>
      <span class="pkg-price">${p.price} TK</span>
    `;
    div.onclick = ()=>selectPkg(i,div);
    pkgList.appendChild(div);
  });

  function selectPkg(i,div){
    document.querySelectorAll(".pkg-card").forEach(el=>el.classList.remove("selected"));
    div.classList.add("selected");
    selected = packages[i];
  }

  window.placeFFOrder = async function(){
    const uid = document.getElementById("uidInput").value.trim();
    if(!selected) return alert("⚠️ একটি প্যাকেজ সিলেক্ট করুন!");
    if(!uid) return alert("⚠️ UID দিন!");

    const user = auth.currentUser;
    if(!user) return alert("Please login!");

    await addDoc(collection(db,"orders"),{
      user:user.uid,
      email:user.email,
      uid,
      product:"Free Fire "+selected.name,
      price:selected.price,
      status:"pending",
      created:new Date()
    });

    // SUCCESS POPUP SHOW
    document.getElementById("popupMsg").innerText = 
      `${selected.name} (${selected.price} TK)`;

    document.getElementById("popupSuccess").style.display="flex";

    document.getElementById("uidInput").value="";
    document.querySelectorAll(".pkg-card").forEach(el=>el.classList.remove("selected"));
    selected=null;
  }
</script>

</body>
</html>
