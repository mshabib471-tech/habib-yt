<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Free Fire TopUp | Habib YT</title>

  <style>
    body {
      font-family: "Poppins", sans-serif;
      background: #f4f7fb;
      margin: 0;
      color: #222;
      padding-bottom: 80px;
    }

    header {
      background: #007bff;
      color: white;
      padding: 12px 18px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    header img { height: 40px; border-radius: 50%; }

    h2 { text-align:center; margin:15px 0; color:#007bff; }

    /* Packages */
    .package-list {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
      gap: 10px;
      padding: 10px;
    }
    .package {
      background: white;
      padding: 10px;
      border-radius: 10px;
      text-align: center;
      border: 2px solid transparent;
      cursor: pointer;
      transition: .2s;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }
    .package.selected {
      border-color: #007bff;
      background: #e8f1ff;
    }
    .package:hover { transform: scale(1.03); }

    /* Input Box */
    .box {
      background: white;
      width: 90%;
      max-width: 430px;
      padding: 15px;
      margin: 15px auto;
      border-radius: 10px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
      text-align: center;
    }

    input {
      width: 100%;
      padding: 10px;
      border-radius: 8px;
      border: 1px solid #ccc;
      margin-top: 8px;
      font-size: 16px;
    }

    button {
      background: #007bff;
      color: white;
      padding: 10px 15px;
      border: none;
      border-radius: 8px;
      margin-top: 12px;
      width: 100%;
      cursor: pointer;
      font-weight: bold;
    }
    button:hover { background:#0056d4; }

    /* SUCCESS POPUP */
    #popupSuccess {
      position: fixed;
      top:0; left:0;
      width:100%; height:100%;
      background: rgba(0,0,0,0.6);
      display:none;
      justify-content:center;
      align-items:center;
      z-index:9999;
    }
    #popupSuccess .card {
      background:white;
      padding:20px;
      border-radius:15px;
      width:85%;
      max-width:350px;
      text-align:center;
      animation: pop .3s ease;
    }
    @keyframes pop {
      from { transform:scale(.7); opacity:0; }
      to   { transform:scale(1); opacity:1; }
    }
  </style>
</head>

<body>

<header>
  <img src="assets/logo.png">
  <h3>Free Fire Diamond</h3>
  <button onclick="location.href='index.html'" style="background:white;color:#007bff;">Home</button>
</header>

<h2>🔥 Diamond Packages</h2>

<!-- PACKAGE LIST -->
<div class="package-list" id="packageList"></div>

<!-- BALANCE + PRICE INFO -->
<div class="box">
  <p><b>💰 Wallet Balance:</b> <span id="walletBalance">0</span> TK</p>
  <p><b>🛒 Selected Package:</b> <span id="selectedPack">None</span></p>
  <p><b>💵 Price Required:</b> <span id="requiredPrice">0</span> TK</p>
</div>

<!-- UID -->
<div class="box">
  <h3>🎮 Enter Free Fire UID</h3>
  <input type="text" id="uidInput" placeholder="Enter your UID">

  <button onclick="checkName()">Check Player Name</button>
  <p id="playerName" style="margin-top:10px;color:#007bff;font-weight:bold;"></p>

  <button onclick="placeFFOrder()">Order Now</button>
</div>

<!-- SUCCESS POPUP -->
<div id="popupSuccess">
  <div class="card">
    <h3 style="color:#00c851;">✅ Order Successful!</h3>
    <p>Your Free Fire top-up request has been received.</p>
    <button onclick="location.href='index.html'">Go To Home</button>
  </div>
</div>

<!-- BOTTOM NAV -->
<div class="bottom-nav" style="
position:fixed;bottom:0;width:100%;background:white;
border-top:1px solid #ccc;display:flex;justify-content:space-around;padding:10px 0;">
  <button onclick="location.href='index.html'">🏠 Home</button>
  <button onclick="location.href='dashboard.html'">💼 Dashboard</button>
  <button onclick="location.href='add-money.html'">💰 Add Money</button>
  <button onclick="location.href='login.html'">🔐 Login</button>
</div>


<!-- FIREBASE -->
<script type="module" src="firebase.js"></script>

<script type="module">

  import { auth, db } from "./firebase.js";
  import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.5.0/firebase-auth.js";
  import { doc, getDoc, addDoc, collection } from "https://www.gstatic.com/firebasejs/12.5.0/firebase-firestore.js";

  let selected = null;

  // PACKAGES
  const packages = [
    { name: "25 Diamond", price: 23 },
    { name: "50 Diamond", price: 38 },
    { name: "100 Diamond", price: 74 },
    { name: "240 Diamond", price: 156 },
    { name: "355 Diamond", price: 235 },
    { name: "480 Diamond", price: 315 },
    { name: "610 Diamond", price: 395 },
    { name: "850 Diamond", price: 550 }
  ];

  const list = document.getElementById("packageList");
  const walletText = document.getElementById("walletBalance");
  const selectedPack = document.getElementById("selectedPack");
  const requiredPrice = document.getElementById("requiredPrice");

  packages.forEach((p, i) => {
    const div = document.createElement("div");
    div.className = "package";
    div.innerHTML = `<h4>${p.name}</h4><p>${p.price} TK</p>`;
    div.onclick = () => selectPack(i, div);
    list.appendChild(div);
  });

  function selectPack(i, div) {
    document.querySelectorAll(".package").forEach(el => el.classList.remove("selected"));
    div.classList.add("selected");

    selected = packages[i];
    selectedPack.textContent = selected.name;
    requiredPrice.textContent = selected.price;
  }

  // LOAD WALLET
  onAuthStateChanged(auth, async (user) => {
    if (!user) return;

    const snap = await getDoc(doc(db, "wallets", user.uid));
    walletText.textContent = snap.exists() ? snap.data().balance : 0;
  });

  // CHECK PLAYER NAME (Dummy)
  window.checkName = function() {
    const uid = document.getElementById("uidInput").value;
    if (!uid) return alert("Enter UID!");

    document.getElementById("playerName").textContent = "Player Found ✔ (Demo)";
  }

  // ORDER SUBMIT
  window.placeFFOrder = async function() {

    const user = auth.currentUser;
    if (!user) return alert("Please login!");

    if (!selected) return alert("Select a package!");

    const uid = document.getElementById("uidInput").value;
    if (!uid) return alert("Enter UID!");

    const snap = await getDoc(doc(db, "wallets", user.uid));
    let bal = snap.exists() ? snap.data().balance : 0;

    if (bal < selected.price) return alert("Not enough balance!");

    await addDoc(collection(db, "orders"), {
      user: user.uid,
      email: user.email,
      product: "FF " + selected.name,
      uid,
      price: selected.price,
      status: "pending",
      created: new Date()
    });

    document.getElementById("popupSuccess").style.display = "flex";
  }

</script>
</body>
</html>
