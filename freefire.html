<!-- freefire.html -->
<!DOCTYPE html>
<html lang="bn">
<head><meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/><title>Free Fire | Habib YT</title><link rel="stylesheet" href="style.css"></head>
<body>
<header class="topbar container"><div class="logo-wrap"><img src="assets/logo.png" alt=""><div><div class="site-title">Free Fire Topup</div></div></div><div><button onclick="go('index.html')" class="login-btn">Back</button></div></header>

<div class="container">
  <h3 class="center">Free Fire Diamond Packs</h3>
  <div class="options-grid">
    <div class="option" data-name="25 Diamond" data-price="24">25 Diamond<br><span class="small">৳24</span></div>
    <div class="option" data-name="100 Diamond" data-price="95">100 Diamond<br><span class="small">৳95</span></div>
    <div class="option" data-name="520 Diamond" data-price="480">520 Diamond<br><span class="small">৳480</span></div>
    <div class="option" data-name="1060 Diamond" data-price="980">1060 Diamond<br><span class="small">৳980</span></div>
  </div>

  <div style="margin-top:12px;" class="card-small">
    <label class="small">Free Fire UID</label>
    <input id="uid" placeholder="Game UID (10 digit)" />
    <button id="orderNow" class="btn">Order Now</button>
  </div>
</div>

<nav class="bottom-nav">
  <div onclick="go('index.html')">🏠</div>
  <div onclick="go('add-money.html')">➕</div>
  <div onclick="go('order.html')">📦</div>
  <div onclick="go('dashboard.html')">👤</div>
</nav>

<script type="module">
  import { auth, db, ensureUserDoc } from './app.js';
  import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.5.0/firebase-auth.js";
  import { collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/12.5.0/firebase-firestore.js";

  let selected = null;
  document.querySelectorAll('.option').forEach(o=>{
    o.addEventListener('click', ()=> {
      document.querySelectorAll('.option').forEach(x=>x.classList.remove('selected'));
      o.classList.add('selected');
      selected = {name: o.dataset.name, price: parseFloat(o.dataset.price)};
    });
  });

  document.getElementById('orderNow').addEventListener('click', () => {
    const uid = document.getElementById('uid').value.trim();
    if (!selected) return alert('প্যাকেজ সিলেক্ট করুন');
    if (!uid) return alert('UID লিখুন');

    onAuthStateChanged(auth, async (user) => {
      if (!user) return alert('Login করুন');
      await ensureUserDoc(user);
      await addDoc(collection(db,'orders'), {
        userEmail: user.email,
        product: 'Free Fire - ' + selected.name,
        amount: selected.price,
        details: 'UID: ' + uid,
        status: 'pending',
        createdAt: serverTimestamp()
      });
      alert('✅ Order submitted — admin will process it.');
      window.location.href='dashboard.html';
    });
  });
</script>
</body>
</html>
