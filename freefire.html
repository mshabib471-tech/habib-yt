<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Free Fire Topup | Habib YT</title>
  <style>
    body {
      font-family: "Poppins", sans-serif;
      background: #f4f7fb;
      color: #222;
      margin: 0;
      padding-bottom: 70px;
    }
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: #007bff;
      color: white;
      padding: 12px 18px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
    }
    header img {
      height: 40px;
      border-radius: 50%;
    }
    h2 {
      text-align: center;
      color: #007bff;
      margin: 18px 0;
    }

    /* Grid of Packages */
    .package-list {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 12px;
      padding: 15px;
    }
    .package {
      background: white;
      border-radius: 10px;
      text-align: center;
      padding: 12px;
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.08);
      transition: 0.2s;
      cursor: pointer;
      border: 2px solid transparent;
    }
    .package:hover {
      transform: scale(1.03);
    }
    .package.selected {
      border-color: #007bff;
      background: #e8f1ff;
    }
    .package h4 {
      margin: 5px 0;
      color: #333;
    }
    .package p {
      color: #007bff;
      font-weight: bold;
      margin: 4px 0;
    }
    .input-box {
      background: white;
      margin: 18px auto;
      width: 90%;
      max-width: 400px;
      padding: 15px;
      border-radius: 10px;
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.1);
      text-align: center;
    }
    input {
      width: 100%;
      padding: 10px;
      border-radius: 8px;
      border: 1px solid #ccc;
      margin-top: 10px;
      font-size: 16px;
    }
    button.order {
      background: #007bff;
      color: white;
      border: none;
      padding: 12px 25px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 16px;
      margin-top: 10px;
      width: 100%;
    }
    button.order:hover {
      background: #0056d4;
    }
    footer {
      text-align: center;
      background: #007bff;
      color: white;
      padding: 10px;
      margin-top: 25px;
    }
    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      background: #fff;
      border-top: 1px solid #ccc;
      display: flex;
      justify-content: space-around;
      padding: 10px 0;
    }
    .bottom-nav button {
      background: none;
      border: none;
      color: #007bff;
      font-weight: bold;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <header>
    <img src="assets/logo.png" alt="Habib YT Logo" />
    <h3>Habib YT</h3>
    <button onclick="window.location.href='index.html'"
      style="background:white;color:#007bff;padding:6px 10px;border:none;border-radius:8px;font-weight:600;">
      Home
    </button>
  </header>

  <h2>🔥 Free Fire Diamond টপ-আপ</h2>

  <!-- Packages -->
  <div class="package-list" id="packageList"></div>

  <!-- UID Input -->
  <div class="input-box">
    <h4>🎮 আপনার Free Fire UID দিন:</h4>
    <input type="text" id="uidInput" placeholder="আপনার UID লিখুন" />
    <button class="order" onclick="placeFFOrder()">Order Now</button>
  </div>

  <footer>© 2025 Habib YT — আপনার বিশ্বস্ত সহযোগী</footer>

  <div class="bottom-nav">
    <button onclick="window.location.href='index.html'">🏠 Home</button>
    <button onclick="window.location.href='dashboard.html'">💼 Dashboard</button>
    <button onclick="window.location.href='add-money.html'">💰 Add Money</button>
    <button onclick="window.location.href='login.html'">🔐 Login</button>
  </div>

  <script type="module" src="firebase.js"></script>
  <script type="module">
    import { auth, db } from "./firebase.js";
    import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.5.0/firebase-auth.js";
    import { addDoc, collection } from "https://www.gstatic.com/firebasejs/12.5.0/firebase-firestore.js";

    // 🔹 প্যাকেজ লিস্ট (UI)
    const packages = [
      { name: "25 Diamond", price: 23 },
      { name: "50 Diamond", price: 38 },
      { name: "100 Diamond", price: 74 },
      { name: "240 Diamond", price: 156 },
      { name: "355 Diamond", price: 235 },
      { name: "480 Diamond", price: 315 },
      { name: "610 Diamond", price: 395 },
      { name: "850 Diamond", price: 550 },
      { name: "1240 Diamond", price: 790 },
      { name: "1850 Diamond", price: 1175 },
      { name: "3140 Diamond", price: 1970 },
      { name: "Weekly Pass", price: 155 },
      { name: "Monthly Pass", price: 768 },
      { name: "1 Weekly + 1 Monthly", price: 921 },
      { name: "2 Weekly + 1 Monthly", price: 1080 },
      { name: "3 Weekly + 1 Monthly", price: 1230 },
      { name: "4 Weekly + 1 Monthly", price: 1385 },
    ];

    // প্যাকেজ রেন্ডার
    const list = document.getElementById("packageList");
    let selected = null;
    packages.forEach((p, i) => {
      const div = document.createElement("div");
      div.className = "package";
      div.innerHTML = `<h4>${p.name}</h4><p>${p.price} TK</p>`;
      div.onclick = () => selectPackage(i, div);
      list.appendChild(div);
    });

    function selectPackage(i, div) {
      document.querySelectorAll(".package").forEach((el) => el.classList.remove("selected"));
      div.classList.add("selected");
      selected = packages[i];
    }

    // অর্ডার সাবমিট
    window.placeFFOrder = async function () {
      const uid = document.getElementById("uidInput").value.trim();
      if (!selected) return alert("⚠️ প্রথমে একটি প্যাকেজ সিলেক্ট করুন!");
      if (!uid) return alert("⚠️ আপনার UID দিন!");

      const user = auth.currentUser;
      if (!user) return alert("Please login first!");

      await addDoc(collection(db, "orders"), {
        user: user.uid,
        email: user.email,
        product: `Free Fire ${selected.name}`,
        uid: uid,
        price: selected.price,
        status: "pending",
        created: new Date(),
      });

      alert(`✅ অর্ডার সম্পন্ন হয়েছে: ${selected.name} (${selected.price} TK)`);
      document.getElementById("uidInput").value = "";
      document.querySelectorAll(".package").forEach((el) => el.classList.remove("selected"));
      selected = null;
    };
  </script>
</body>
</html>
