<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Free Fire Top-Up | Habib YT</title>

  <style>
    body {
      font-family: "Poppins", sans-serif;
      background: #f4f7fb;
      color: #222;
      margin: 0;
      padding-bottom: 80px;
    }

    /* HEADER */
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: #007bff;
      color: #fff;
      padding: 14px 18px;
      box-shadow: 0 3px 10px rgba(0,0,0,0.15);
    }

    header img {
      height: 40px;
      border-radius: 50%;
    }

    /* PAGE TITLE */
    h2 {
      text-align: center;
      color: #007bff;
      margin: 15px 0;
    }

    /* PACKAGE GRID */
    .package-list {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 12px;
      padding: 15px;
    }

    .package {
      background: white;
      padding: 12px;
      border-radius: 12px;
      box-shadow: 0 3px 8px rgba(0,0,0,0.1);
      text-align: center;
      cursor: pointer;
      transition: 0.25s;
      border: 2px solid transparent;
    }

    .package:hover { transform: scale(1.03); }

    .package.selected {
      border-color: #007bff;
      background: #e9f2ff;
    }

    .package h4 { margin: 5px 0; }
    .package p { color: #007bff; font-weight: bold; }

    /* INPUT BOX */
    .box {
      background: white;
      width: 90%;
      max-width: 400px;
      margin: 15px auto;
      padding: 15px;
      border-radius: 12px;
      box-shadow: 0 3px 8px rgba(0,0,0,0.1);
    }

    input {
      width: 100%;
      padding: 10px;
      border-radius: 8px;
      border: 1px solid #ccc;
      margin-top: 8px;
      font-size: 15px;
    }

    /* BUTTON */
    .btn {
      width: 100%;
      background: #007bff;
      color: white;
      border: none;
      padding: 12px;
      border-radius: 8px;
      margin-top: 12px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
    }
    .btn:hover { background: #005cd4; }

    .check-btn {
      background: #28a745;
    }
    .check-btn:hover { background: #1e7e34; }

    /* SUCCESS POPUP */
    #successPopup {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      display: none;
      justify-content: center;
      align-items: center;
      background: rgba(0,0,0,0.55);
      z-index: 9999;
    }

    .popup-box {
      background: white;
      width: 85%;
      max-width: 360px;
      padding: 22px;
      border-radius: 16px;
      text-align: center;
      animation: popup .35s ease;
      box-shadow: 0 8px 25px rgba(0,0,0,0.25);
    }

    @keyframes popup {
      from { transform: scale(0.7); opacity: 0; }
      to   { transform: scale(1); opacity: 1; }
    }

    .popup-box img {
      width: 100px;
      margin-bottom: 10px;
    }

    .popup-box button {
      width: 100%;
      padding: 12px;
      margin-top: 12px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      font-weight: bold;
    }

    .go-home { background: #007bff; color: white; }
    .view-orders { background: #e9e9e9; color: #333; }

    /* FOOTER */
    footer {
      text-align: center;
      background: #007bff;
      color: white;
      padding: 10px;
      margin-top: 18px;
    }

    /* BOTTOM NAV */
    .bottom-nav {
      position: fixed;
      bottom: 0; width: 100%;
      background: white;
      border-top: 1px solid #ccc;
      display: flex;
      justify-content: space-around;
      padding: 10px 0;
    }

    .bottom-nav button {
      background: none;
      border: none;
      color: #007bff;
      font-weight: bold;
      font-size: 15px;
      cursor: pointer;
    }
  </style>
</head>

<body>

<!-- ================= HEADER ================= -->
<header>
  <img src="assets/logo.png">
  <h3>Free Fire Top-Up</h3>
  <button onclick="location.href='index.html'" style="padding:8px 14px; border:none; border-radius:8px;">Home</button>
</header>

<h2>🔥 Free Fire Diamond টপ-আপ</h2>

<!-- ================= PACKAGE LIST ================= -->
<div class="package-list" id="packageList"></div>

<!-- ================= UID/INFO BOX ================= -->
<div class="box">
  <label>🎮 আপনার UID দিন:</label>
  <input id="uid" type="number" placeholder="Enter UID">

  <button class="btn check-btn" onclick="checkPlayer()">🔍 Check Player Name</button>

  <p id="playerName" style="color:#007bff; font-weight:bold; margin-top:10px;"></p>

  <button class="btn" onclick="placeOrder()">Confirm Order</button>
</div>

<!-- ================= SUCCESS POPUP ================= -->
<div id="successPopup">
  <div class="popup-box">
    <img src="assets/success.gif">
    <h3>🎉 অর্ডার সফল!</h3>
    <p id="successMsg"></p>

    <button class="go-home" onclick="location.href='index.html'">🏠 Go To Home</button>
    <button class="view-orders" onclick="location.href='dashboard.html'">📦 View Orders</button>
  </div>
</div>

<footer>© 2025 Habib YT — আপনার বিশ্বস্ত সহযোগী</footer>

<!-- ================= BOTTOM NAV ================= -->
<div class="bottom-nav">
  <button onclick="location.href='index.html'">🏠 Home</button>
  <button onclick="location.href='dashboard.html'">💼 Dashboard</button>
  <button onclick="location.href='add-money.html'">💰 Add Money</button>
  <button onclick="location.href='login.html'">🔐 Login</button>
</div>

<!-- ================= FIREBASE ================= -->
<script type="module">
  import { auth, db } from "./firebase.js";
  import {
    getDoc, doc, setDoc,
    addDoc, collection
  } from "https://www.gstatic.com/firebasejs/12.5.0/firebase-firestore.js";
  import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.5.0/firebase-auth.js";

  /* ------------------------- PACKAGES ------------------------- */
  const packages = [
    { name: "25 Diamond", price: 23 },
    { name: "50 Diamond", price: 38 },
    { name: "100 Diamond", price: 74 },
    { name: "240 Diamond", price: 156 },
    { name: "355 Diamond", price: 235 },
    { name: "480 Diamond", price: 315 }
  ];

  let selected = null;
  const list = document.getElementById("packageList");

  packages.forEach((p, i) => {
    const div = document.createElement("div");
    div.className = "package";
    div.innerHTML = `<h4>${p.name}</h4><p>${p.price} TK</p>`;
    div.onclick = () => selectPackage(i, div);
    list.appendChild(div);
  });

  function selectPackage(index, element) {
    document.querySelectorAll(".package").forEach(el => el.classList.remove("selected"));
    element.classList.add("selected");
    selected = packages[index];
  }

  /* --------------------- CHECK PLAYER NAME --------------------- */
  window.checkPlayer = function() {
    const uid = document.getElementById("uid").value;

    if (!uid) return alert("⚠ UID দিন!");

    document.getElementById("playerName").innerText = "Searching...";

    // Demo response
    setTimeout(() => {
      document.getElementById("playerName").innerText = "Player Found: Habibur Rahman";
    }, 1000);
  };

  /* --------------------------- ORDER ---------------------------- */
  window.placeOrder = async function() {
    if (!selected) return alert("⚠ একটি প্যাকেজ নির্বাচন করুন");
    const uid = document.getElementById("uid").value.trim();
    if (!uid) return alert("⚠ UID লিখুন");

    const user = auth.currentUser;
    if (!user) return alert("Login required");

    // Save order
    await addDoc(collection(db, "orders"), {
      user: user.uid,
      email: user.email,
      product: selected.name,
      uid,
      price: selected.price,
      status: "pending",
      created: new Date()
    });

    // Show Popup
    document.getElementById("successMsg").innerText =
      `${selected.name} (${selected.price} TK) অর্ডার সফলভাবে নেয়া হয়েছে।`;

    document.getElementById("successPopup").style.display = "flex";
  };
</script>

</body>
</html>
