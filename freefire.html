<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Free Fire Topup | Habib YT</title>

  <style>
    body {
      font-family: "Poppins", sans-serif;
      background: #f4f7fb;
      margin: 0;
      padding-bottom: 80px;
    }

    header {
      background: #007bff;
      padding: 12px 18px;
      color: white;
      display: flex;
      justify-content: space-between;
      align-items: center;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }

    header img {
      height: 40px;
      border-radius: 50%;
    }

    h2 {
      text-align: center;
      margin: 15px 0;
      color: #007bff;
    }

    /* Step Title */
    .stepTitle {
      font-size: 20px;
      margin: 12px 15px;
      font-weight: 600;
      color: #333;
    }

    /* Package Grid */
    .package-list {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(145px, 1fr));
      gap: 12px;
      padding: 15px;
    }

    .package {
      background: white;
      padding: 10px;
      border-radius: 10px;
      text-align: center;
      cursor: pointer;
      border: 2px solid transparent;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
      transition: 0.2s;
    }

    .package.selected {
      border-color: #007bff;
      background: #e9f2ff;
    }

    .package h4 {
      margin: 6px 0;
      font-size: 15px;
    }

    .package p {
      color: #007bff;
      font-weight: bold;
      margin: 4px 0;
    }
  </style>
</head>

<body>

<header>
  <img src="assets/logo.png" />
  <h3>Habib YT</h3>
  <button onclick="location.href='index.html'"
    style="padding:6px 12px; background:white; border:none; border-radius:8px; color:#007bff; font-weight:600;">
    Home
  </button>
</header>

<h2>🔥 Free Fire Diamond Topup</h2>

<h3 class="stepTitle">1️⃣ Select Recharge</h3>

<div class="package-list" id="packageList"></div>

<!-- ============================
     STEP 2 — ACCOUNT INFO
============================ -->
<h3 class="stepTitle">2️⃣ Account Info</h3>

<div style="
  background:white;
  margin:15px;
  padding:15px;
  border-radius:12px;
  box-shadow:0 2px 6px rgba(0,0,0,0.1);
">
  <label style="font-weight:600;">Player UID:</label>
  <input type="text" id="uidInput"
    placeholder="Enter your Free Fire UID"
    style="width:100%; padding:10px; margin-top:6px; border-radius:8px; border:1px solid #ccc; font-size:15px;">
  
  <button onclick="checkPlayerName()" style="
    margin-top:10px;
    width:100%;
    background:#ff8800;
    color:white;
    padding:10px;
    border:none;
    border-radius:8px;
    font-size:15px;
    font-weight:600;
  ">🔍 Click to Check Player Name</button>

  <p id="playerNameBox" style="margin-top:10px; font-size:15px; font-weight:600; color:#007bff;"></p>
</div>


<!-- ============================
     STEP 3 — PAYMENT METHOD
============================ -->
<h3 class="stepTitle">3️⃣ Select Payment Option</h3>

<div style="display:flex; gap:10px; margin:15px;">
  
  <!-- Wallet Pay -->
  <div id="walletBox"
    onclick="selectPay('wallet')"
    style="
      flex:1; background:white; padding:12px; border-radius:12px;
      box-shadow:0 2px 6px rgba(0,0,0,0.1);
      border:2px solid transparent;
      text-align:center; cursor:pointer;">
    <img src="assets/wallet.png" style="height:60px;">
    <h4>Wallet Pay</h4>
  </div>

  <!-- Instant Pay -->
  <div id="instantBox"
    onclick="selectPay('instant')"
    style="
      flex:1; background:white; padding:12px; border-radius:12px;
      box-shadow:0 2px 6px rgba(0,0,0,0.1);
      border:2px solid transparent;
      text-align:center; cursor:pointer;">
    <img src="assets/payment.png" style="height:60px;">
    <h4>Instant Pay</h4>
  </div>
</div>


<!-- ============================
     BALANCE & REQUIREMENT DISPLAY
============================ -->
<div style="
  background:white;
  margin:15px;
  padding:15px;
  border-radius:12px;
  box-shadow:0 2px 6px rgba(0,0,0,0.1);
  font-size:15px;">
  
  <p>ℹ️ আপনার অ্যাকাউন্ট ব্যালেন্স: <b id="walletBalance">Loading...</b></p>
  <p>ℹ️ প্রোডাক্ট কিনতে প্রয়োজন: <b id="needAmount">0</b> টাকা</p>
</div>


<!-- BUY NOW BUTTON -->
<button onclick="placeFFOrder()" style="
  width:92%;
  margin:20px auto;
  display:block;
  background:#6a00ff;
  padding:14px;
  color:white;
  border:none;
  border-radius:10px;
  font-size:18px;
  font-weight:700;
  box-shadow:0 4px 8px rgba(0,0,0,0.2);
">
  Buy Now
</button>

<script type="module">
import { auth, db } from "./firebase.js";
import {
  onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/12.5.0/firebase-auth.js";

import {
  doc, getDoc, updateDoc, addDoc, collection
} from "https://www.gstatic.com/firebasejs/12.5.0/firebase-firestore.js";


// ================================
// GLOBAL VARIABLES
// ================================
let selectedPackage = null;
let selectedPayMethod = "instant"; // default
let walletAmount = 0;


// ================================
// SHOW PACKAGE PRICE IN “NEED AMOUNT”
// ================================
function updateNeedAmount() {
  if (!selectedPackage) return;
  document.getElementById("needAmount").innerText = selectedPackage.price + " টাকা";
}


// ================================
// PAYMENT BOX SELECT
// ================================
window.selectPay = function (method) {
  selectedPayMethod = method;

  document.getElementById("walletBox").style.borderColor =
    method === "wallet" ? "#6a00ff" : "transparent";

  document.getElementById("instantBox").style.borderColor =
    method === "instant" ? "#6a00ff" : "transparent";
};


// ================================
// PLAYER NAME CHECK (DUMMY API)
// ================================
window.checkPlayerName = function () {
  const uid = document.getElementById("uidInput").value.trim();

  if (!uid) {
    alert("⚠️ UID দিন!");
    return;
  }

  // 🔥 আপনার API থাকলে এখানে যোগ করবেন
  const fakeName = "Player_" + uid.slice(-4); // Demo Name
  
  document.getElementById("playerNameBox").innerText =
    "✔ Player Name: " + fakeName;
};


// ================================
// LOAD WALLET BALANCE
// ================================
async function loadWallet(user) {
  const ref = doc(db, "users", user.uid);
  const snap = await getDoc(ref);

  if (snap.exists()) {
    walletAmount = snap.data().wallet || 0;
    document.getElementById("walletBalance").innerText = walletAmount + " টাকা";
  } else {
    document.getElementById("walletBalance").innerText = "0 টাকা";
  }
}


// ================================
// LOAD USER & WALLET AUTOMATICALLY
// ================================
onAuthStateChanged(auth, async (user) => {
  if (!user) {
    alert("Please login!");
    window.location.href = "login.html";
    return;
  }

  await loadWallet(user);
});


// ================================
// PACKAGE CLICK SYSTEM (FROM UI)
// ================================
window.selectPackageUI = function (name, price) {
  selectedPackage = { name, price };
  updateNeedAmount();

  // Remove previous selection
  document.querySelectorAll(".package").forEach(box => {
    box.classList.remove("selected");
  });

  // Highlight current
  event.currentTarget.classList.add("selected");
};


// ================================
// PLACE ORDER
// ================================
window.placeFFOrder = async function () {
  const uidInput = document.getElementById("uidInput").value.trim();

  if (!uidInput) return alert("⚠️ UID দিন!");
  if (!selectedPackage) return alert("⚠️ প্যাকেজ সিলেক্ট করুন!");

  const user = auth.currentUser;
  if (!user) return alert("Please login!");

  // Wallet payment check
  if (selectedPayMethod === "wallet") {
    if (walletAmount < selectedPackage.price) {
      return alert("❌ আপনার ব্যালেন্স পর্যাপ্ত নয়!");
    }
  }

  // Create ORDER
  await addDoc(collection(db, "orders"), {
    user: user.uid,
    email: user.email,
    product: selectedPackage.name,
    uid: uidInput,
    price: selectedPackage.price,
    method: selectedPayMethod,
    status: "pending",
    created: new Date()
  });

  // Deduct wallet if wallet pay
  if (selectedPayMethod === "wallet") {
    const userRef = doc(db, "users", user.uid);
    await updateDoc(userRef, {
      wallet: walletAmount - selectedPackage.price
    });
  }

  alert("✅ অর্ডার সম্পন্ন হয়েছে!\n" + selectedPackage.name);

  // Reset input
  document.getElementById("uidInput").value = "";
  document.getElementById("playerNameBox").innerText = "";
  selectedPackage = null;
  updateNeedAmount();
};
</script>
