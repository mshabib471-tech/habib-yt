<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Free Fire Top-up | Habib YT</title>

<style>
  body{margin:0;font-family:Poppins,sans-serif;background:#f6f9ff;padding-bottom:100px;}

  header{
    background:#0a7cff;padding:15px;display:flex;justify-content:space-between;
    align-items:center;color:#fff;box-shadow:0 3px 10px rgba(0,0,0,0.15);
  }
  header img{width:45px;height:45px;border-radius:50%;}
  .home-btn{
    background:#fff;padding:7px 15px;border-radius:10px;color:#0a7cff;
    border:none;font-weight:600;cursor:pointer;
  }

  .section-title{font-size:20px;font-weight:600;margin:20px 10px 10px;color:#333;}

  .package-grid{
    display:grid;grid-template-columns:repeat(2,1fr);gap:12px;padding:10px;
  }
  .box{
    background:#fff;padding:12px;border-radius:12px;
    box-shadow:0 2px 7px rgba(0,0,0,0.1);
    cursor:pointer;border:2px solid transparent;transition:.2s;
  }
  .box.selected{border-color:#0a7cff;background:#e9f3ff;}

  .input-area{
    background:#fff;margin:15px;padding:15px;border-radius:12px;
    box-shadow:0 2px 8px rgba(0,0,0,0.1);
  }
  input{
    width:100%;padding:10px;margin-top:8px;border:1px solid #ccc;
    border-radius:8px;font-size:16px;
  }

  .check-btn{
    width:100%;background:linear-gradient(90deg,#ff416c,#ff4b2b);color:white;
    border:none;padding:12px;margin-top:10px;font-weight:600;border-radius:10px;cursor:pointer;
  }

  #playerName{color:#0a7cff;font-weight:600;margin-top:8px;min-height:25px;}

  .payment-box{
    background:#fff;margin:15px;padding:15px;border-radius:12px;
    box-shadow:0 2px 8px rgba(0,0,0,0.1);
  }
  .pay-option{display:flex;gap:10px;}
  .pay{
    flex:1;background:#f2f5ff;border-radius:12px;padding:15px;text-align:center;
    border:2px solid transparent;cursor:pointer;
  }
  .pay.selected{border-color:#0a7cff;background:#e8f1ff;}

  .buy-btn{
    width:100%;padding:14px;background:#6c4bff;color:white;border:none;
    font-size:18px;border-radius:12px;margin-top:10px;cursor:pointer;
    font-weight:600;
  }
</style>
</head>

<body>

<header>
  <img src="assets/logo.png">
  <h2>Habib YT</h2>
  <button class="home-btn" onclick="location.href='index.html'">Home</button>
</header>

<h3 class="section-title">1️⃣ Select Recharge</h3>
<div class="package-grid" id="packageGrid"></div>

<h3 class="section-title">2️⃣ Account Info</h3>

<div class="input-area">
  <b>Player UID</b>
  <input type="number" id="uid" placeholder="Enter Free Fire UID">
  <button class="check-btn" onclick="checkUID()">Check Player Name</button>
  <p id="playerName"></p>
</div>

<h3 class="section-title">3️⃣ Payment Methods</h3>

<div class="payment-box">
  <div class="pay-option">
    <div class="pay selected" id="walletPay" onclick="selectPay('wallet')">
      <img src="assets/wallet.png" width="70">
      <h4>Wallet Pay</h4>
    </div>

    <div class="pay" id="instantPay" onclick="selectPay('instant')">
      <img src="assets/bkash-nagad-rocket.png" width="70">
      <h4>Instant Pay</h4>
    </div>
  </div>

  <div id="infoText">
    Wallet Balance: <b id="balance">0</b> TK<br>
    Required Amount: <b id="need">0</b> TK
  </div>

  <button class="buy-btn" onclick="placeOrder()">BUY NOW</button>
</div>

<!-- FIREBASE -->
<script type="module">
import { auth, db } from "./firebase.js";
import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.5.0/firebase-auth.js";
import { addDoc, collection, doc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/12.5.0/firebase-firestore.js";

/* FIXED ERROR HERE */
let selectedPackage = null;
let selectedPayment = "wallet";
let userUID = null;
let userBalance = 0;

/* PACKAGES */
const packages = [
  {name:"25 Diamond",price:23},{name:"50 Diamond",price:38},
  {name:"100 Diamond",price:74},{name:"115 Diamond",price:78},
  {name:"240 Diamond",price:156},{name:"355 Diamond",price:235},
  {name:"480 Diamond",price:315},{name:"610 Diamond",price:395},
  {name:"725 Diamond",price:475},{name:"850 Diamond",price:550},
  {name:"1090 Diamond",price:705},{name:"1240 Diamond",price:790},
  {name:"1595 Diamond",price:1015},{name:"1850 Diamond",price:1175},
  {name:"2530 Diamond",price:1580},{name:"3140 Diamond",price:1970},
  {name:"Weekly Pass",price:155},{name:"Monthly Pass",price:768},
  {name:"1 Weekly + 1 Monthly",price:921},{name:"2 Weekly + 1 Monthly",price:1080},
  {name:"3 Weekly + 1 Monthly",price:1230},{name:"4 Weekly + 1 Monthly",price:1385}
];

const grid=document.getElementById("packageGrid");
packages.forEach((p,i)=>{
  let div=document.createElement("div");
  div.className="box";
  div.innerHTML=`<h4>${p.name}</h4><p>${p.price} TK</p>`;
  div.onclick=()=>selectPackage(i,div);
  grid.appendChild(div);
});

function selectPackage(i, div){
  document.querySelectorAll(".box").forEach(x => x.classList.remove("selected"));
  div.classList.add("selected");
  selectedPackage = packages[i];
  document.getElementById("need").innerText = selectedPackage.price;
}

/* FIREBASE AUTH */
onAuthStateChanged(auth, async (user)=>{
  if(!user){ alert("Login First!"); location.href="login.html"; return; }

  userUID = user.uid;

  const walletDoc = await getDoc(doc(db,"wallets",userUID));
  if(walletDoc.exists()){
    userBalance = walletDoc.data().balance || 0;
  }

  document.getElementById("balance").innerText = userBalance;
});

window.checkUID = async function () {
  let uid = document.getElementById("uid").value.trim();
  let playerBox = document.getElementById("playerName");

  if (!uid) {
    playerBox.innerHTML = "❌ Please enter UID!";
    playerBox.style.color = "red";
    return;
  }

  playerBox.innerHTML = "⏳ Checking... Please wait";
  playerBox.style.color = "#444";

  try {
    let url = `https://spapi.pro/freefire?id=${uid}`;

    let res = await fetch(url);
    let data = await res.json();

    if (data.status === "success" && data.name) {
      playerBox.innerHTML = "✔ " + data.name;
      playerBox.style.color = "#0a7cff";
    } else {
      playerBox.innerHTML = "❌ Invalid UID!";
      playerBox.style.color = "red";
    }
  } catch (err) {
    playerBox.innerHTML = "⚠️ Server busy, try again!";
    playerBox.style.color = "red";
  }
};

/* PAYMENT SELECT */
window.selectPay=function(type){
  selectedPayment=type;
  document.getElementById("walletPay").classList.toggle("selected",type==="wallet");
  document.getElementById("instantPay").classList.toggle("selected",type==="instant");
}

/* ORDER */
window.placeOrder=async function(){
  if(!selectedPackage) return alert("Select a package!");
  let uid=document.getElementById("uid").value;
  if(!uid) return alert("Enter UID!");

  if(selectedPayment==="wallet" && userBalance < selectedPackage.price){
    return alert("Insufficient balance!");
  }

  if(selectedPayment==="wallet"){
    await updateDoc(doc(db,"wallets",userUID),{
      balance:userBalance-selectedPackage.price
    });
  }

  await addDoc(collection(db,"orders"),{
    user:userUID,
    product:selectedPackage.name,
    uid:uid,
    price:selectedPackage.price,
    payment:selectedPayment,
    status:"pending",
    created:new Date()
  });

  alert("✔ Order Successful!");
  location.href="dashboard.html";
}
</script>

</body>
</html>
